<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oracle-X Ultra | Signaux de Trading IA Temps Réel</title>
    
    <!-- SEO & PWA -->
    <meta name="description" content="Signaux de trading temps réel pour MT4/MT5. Analyse algorithmique avancée.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f1f5f9; margin: 0; }
        .neo-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-active { background: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .signal-buy-active { border: 2px solid #00f2ad; box-shadow: 0 0 20px rgba(0, 242, 173, 0.2); }
        .signal-sell-active { border: 2px solid #ff3c5f; box-shadow: 0 0 20px rgba(255, 60, 95, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <!-- POPUP SIGNAL -->
    <div id="signal-popup" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md"></div>
        <div class="relative neo-glass w-full max-w-md rounded-[2rem] p-8 text-center border border-white/10">
            <div id="popup-badge" class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center font-bold text-2xl">!</div>
            <h2 id="popup-title" class="text-3xl font-black mb-1 italic">SIGNAL DETECTÉ</h2>
            <p class="text-slate-400 text-sm mb-6 uppercase tracking-widest">Exécution Prioritaire MT4/MT5</p>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white/5 p-4 rounded-2xl"><span class="block text-[10px] text-slate-500 mb-1">PRIX ENTREE</span><span id="pop-entry" class="text-xl font-bold font-mono">---</span></div>
                <div class="bg-white/5 p-4 rounded-2xl"><span class="block text-[10px] text-slate-500 mb-1">CIBLE TP</span><span id="pop-tp" class="text-xl font-bold font-mono text-green-400">---</span></div>
            </div>
            <button onclick="closePopup()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">SURVEILLER LA POSITION</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 neo-glass px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="zap" class="text-white w-5 h-5"></i></div>
            <span class="text-xl font-black italic tracking-tighter uppercase">Oracle<span class="text-blue-500">X</span></span>
        </div>
        <div id="status-tag" class="text-[10px] font-bold text-amber-500 flex items-center gap-1.5">
            <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span> CONNEXION...
        </div>
    </nav>

    <main class="p-4 max-w-5xl mx-auto space-y-6">
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="changeAsset('btcusd')" class="asset-tab tab-active px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">BITCOIN</button>
            <button onclick="changeAsset('ethusd')" class="asset-tab bg-white/5 text-slate-400 px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">ETHEREUM</button>
            <button onclick="changeAsset('xrpusd')" class="asset-tab bg-white/5 text-slate-400 px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap">RIPPLE</button>
        </div>

        <div id="main-card" class="neo-glass rounded-[2.5rem] p-6 border border-white/5">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="asset-name" class="text-3xl font-black italic">BITCOIN</h2>
                    <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Live HFT Analysis</span>
                </div>
                <div class="text-right">
                    <div id="price-display" class="text-4xl font-black font-mono tracking-tighter tracking-tight">---</div>
                    <div id="price-change" class="text-xs font-bold text-green-400">+0.00%</div>
                </div>
            </div>

            <div id="chart-box" class="w-full h-[350px] rounded-3xl overflow-hidden mb-6 bg-black/20"></div>

            <div id="signal-area">
                <div id="signal-searching" class="bg-white/5 p-8 rounded-[2rem] text-center border border-dashed border-white/10">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500 mb-3"></div>
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-widest">Scan algorithmique en cours...</p>
                </div>

                <div id="signal-box" class="hidden p-6 rounded-[2rem] flex flex-col md:flex-row items-center gap-6">
                    <div id="action-type" class="w-24 h-24 rounded-3xl flex flex-col items-center justify-center text-center">
                        <span class="text-[10px] font-bold opacity-80 uppercase">Ordre</span>
                        <span id="action-text" class="text-2xl font-black uppercase">---</span>
                    </div>
                    <div class="flex-1 grid grid-cols-2 md:grid-cols-3 gap-4 w-full">
                        <div class="bg-black/40 p-4 rounded-2xl"><span class="text-[9px] text-slate-500 font-bold uppercase">Entrée</span><div id="entry-val" class="font-mono font-bold">---</div></div>
                        <div class="bg-black/40 p-4 rounded-2xl"><span class="text-[9px] text-green-500 font-bold uppercase">Take Profit</span><div id="tp-val" class="font-mono font-bold text-green-400">---</div></div>
                        <div class="bg-black/40 p-4 rounded-2xl"><span class="text-[9px] text-red-500 font-bold uppercase">Stop Loss</span><div id="sl-val" class="font-mono font-bold text-red-400">---</div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentSym = 'btcusd';
        let ws;
        let chart, candles, lastPrice = 0;
        let history = [];
        let activeSignal = null;

        function initChart() {
            const chartDiv = document.getElementById('chart-box');
            chart = LightweightCharts.createChart(chartDiv, {
                layout: { background: { color: 'transparent' }, textColor: '#94a3b8' },
                grid: { vertLines: { visible: false }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
                timeScale: { timeVisible: true, secondsVisible: false },
            });
            candles = chart.addCandlestickSeries({ upColor: '#00f2ad', downColor: '#ff3c5f', borderVisible: false, wickUpColor: '#00f2ad', wickDownColor: '#ff3c5f' });
            
            // Mock initial data so it's not empty
            let data = [], t = Math.floor(Date.now()/1000)-5000;
            for(let i=0; i<100; i++) data.push({time: t+i*60, open: 50000, high: 50100, low: 49900, close: 50050});
            candles.setData(data);
        }

        function connect(sym) {
            if(ws) ws.close();
            const tag = document.getElementById('status-tag');
            
            // On Bitstamp, pair name is lowercase
            ws = new WebSocket('wss://ws.bitstamp.net');
            
            ws.onopen = () => {
                ws.send(JSON.stringify({event: 'bts:subscribe', data: {channel: `live_trades_${sym}`}}));
                tag.innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> LIVE: ${sym.toUpperCase()}`;
                tag.className = "text-[10px] font-bold text-green-500 flex items-center gap-1.5";
            };

            ws.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if(res.event === 'trade') {
                    const price = parseFloat(res.data.price);
                    update(price);
                }
            };

            ws.onerror = () => {
                tag.innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full"></span> ERREUR CONNEXION`;
                tag.className = "text-[10px] font-bold text-red-500 flex items-center gap-1.5";
            };
        }

        function update(p) {
            const display = document.getElementById('price-display');
            display.textContent = p.toLocaleString(undefined, {minimumFractionDigits: 2});
            display.style.color = p >= lastPrice ? '#00f2ad' : '#ff3c5f';
            
            candles.update({ time: Math.floor(Date.now()/1000), open: lastPrice || p, high: Math.max(lastPrice, p), low: Math.min(lastPrice, p), close: p });
            
            history.push(p);
            if(history.length > 20) {
                history.shift();
                analyze(p);
            }
            lastPrice = p;
        }

        function analyze(p) {
            if(activeSignal) return;
            
            // Simple RSI-based logic
            let avg = history.reduce((a,b)=>a+b)/history.length;
            let diff = p - avg;

            if(diff < - (p*0.001)) trigger('BUY', p);
            else if(diff > (p*0.001)) trigger('SELL', p);
        }

        function trigger(type, p) {
            activeSignal = { type, entry: p, tp: type==='BUY'?p*1.005:p*0.995, sl: type==='BUY'?p*0.997:p*1.003 };
            
            document.getElementById('signal-searching').classList.add('hidden');
            const box = document.getElementById('signal-box');
            box.classList.remove('hidden');
            box.className = `p-6 rounded-[2rem] flex flex-col md:flex-row items-center gap-6 ${type==='BUY'?'signal-buy-active bg-emerald-500/10':'signal-sell-active bg-rose-500/10'}`;
            
            const badge = document.getElementById('action-type');
            badge.className = `w-24 h-24 rounded-3xl flex flex-col items-center justify-center text-center text-black font-black ${type==='BUY'?'bg-[#00f2ad]':'bg-[#ff3c5f]'}`;
            document.getElementById('action-text').textContent = type;
            
            document.getElementById('entry-val').textContent = p.toFixed(2);
            document.getElementById('tp-val').textContent = activeSignal.tp.toFixed(2);
            document.getElementById('sl-val').textContent = activeSignal.sl.toFixed(2);

            // Pop
            document.getElementById('pop-entry').textContent = p.toFixed(2);
            document.getElementById('pop-tp').textContent = activeSignal.tp.toFixed(2);
            const pBadge = document.getElementById('popup-badge');
            pBadge.className = `w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center font-bold text-2xl text-black ${type==='BUY'?'bg-[#00f2ad]':'bg-[#ff3c5f]'}`;
            document.getElementById('signal-popup').classList.remove('hidden');
        }

        function closePopup() { document.getElementById('signal-popup').classList.add('hidden'); }

        function changeAsset(sym) {
            currentSym = sym;
            document.querySelectorAll('.asset-tab').forEach(t => {
                t.className = "asset-tab bg-white/5 text-slate-400 px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap";
            });
            event.target.className = "asset-tab tab-active px-6 py-3 rounded-2xl font-bold text-xs whitespace-nowrap";
            document.getElementById('asset-name').textContent = sym.toUpperCase();
            
            // Reset state
            activeSignal = null;
            document.getElementById('signal-box').classList.add('hidden');
            document.getElementById('signal-searching').classList.remove('hidden');
            history = [];
            connect(sym);
        }

        window.onload = () => {
            lucide.createIcons();
            initChart();
            connect('btcusd');
        };
    </script>
</body>
</html>
