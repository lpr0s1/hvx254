<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cristal Clicker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Optimisations mobiles obligatoires */
        :root {
            touch-action: manipulation; /* Empêche le zoom double tap global */
        }
        body {
            overscroll-behavior-y: contain; /* Empêche le pull-to-refresh */
            background-color: #0f172a; /* bg-slate-900 */
        }
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Utilitaires spécifiques */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes popup {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-popup {
            animation: popup 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes floatUpFade {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        .floating-text {
            position: absolute;
            pointer-events: none;
            animation: floatUpFade 0.8s ease-out forwards;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 50;
        }

        /* Couleurs de Rareté */
        .rarity-typique { border-color: #94a3b8; box-shadow: 0 0 10px #94a3b840; }
        .rarity-rare { border-color: #3b82f6; box-shadow: 0 0 15px #3b82f660; }
        .rarity-legendaire { border-color: #fbbf24; box-shadow: 0 0 20px #fbbf2480; }
        
        .text-typique { color: #94a3b8; }
        .text-rare { color: #60a5fa; }
        .text-legendaire { color: #fbbf24; }
        
        .bg-typique { background: linear-gradient(135deg, #64748b, #475569); }
        .bg-rare { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .bg-legendaire { background: linear-gradient(135deg, #fbbf24, #d97706); }

        /* Zone de clic sans action navigateur */
        #click-zone {
            touch-action: none; 
        }
    </style>
</head>
<body class="text-white h-screen w-screen overflow-hidden font-sans flex justify-center">

    <!-- Conteneur principal mobile-first -->
    <div id="app-container" class="relative w-full max-w-md h-full flex flex-col bg-slate-900 shadow-2xl transition-colors duration-500">
        
        <!-- HEADER / WIDGETS -->
        <header class="p-4 flex justify-between items-center bg-slate-800/80 backdrop-blur z-20 shadow-md">
            <!-- Widget Or -->
            <div class="flex items-center gap-2 bg-slate-700/50 px-3 py-1.5 rounded-full border border-slate-600">
                <i class="ph-fill ph-coins text-yellow-400 text-xl"></i>
                <span id="gold-display" class="font-bold font-mono">0</span>
            </div>
            
            <!-- Widget Niveau & XP -->
            <div class="flex-1 mx-4 flex flex-col">
                <div class="flex justify-between text-xs mb-1 font-bold">
                    <span class="text-blue-300">Niv. <span id="level-display">1</span></span>
                    <span class="text-slate-400"><span id="xp-display">0</span> / <span id="xp-max-display">100</span> XP</span>
                </div>
                <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
                    <div id="xp-bar" class="h-full bg-blue-500 transition-all duration-300 w-0"></div>
                </div>
            </div>

            <!-- Bouton Paramètres -->
            <button onclick="toggleSettings()" class="p-2 rounded-full bg-slate-700/50 active:bg-slate-600 transition">
                <i class="ph-bold ph-gear text-xl text-slate-300"></i>
            </button>
        </header>

        <!-- VUES PRINCIPALES -->
        <main class="flex-1 relative overflow-hidden">
            
            <!-- VUE 1 : JEU (CLICKER) -->
            <div id="view-game" class="view h-full w-full flex flex-col items-center justify-center relative">
                <!-- Particules background ajoutées via JS -->
                <div id="click-zone" class="w-64 h-64 relative flex items-center justify-center active:scale-95 transition-transform duration-100 cursor-pointer z-10">
                    <i id="main-crystal" class="ph-fill ph-sketch-logo text-9xl text-cyan-400 drop-shadow-[0_0_30px_rgba(34,211,238,0.6)] animate-float"></i>
                </div>
                <p class="mt-8 text-slate-400 text-sm animate-pulse">Appuyez pour miner</p>
            </div>

            <!-- VUE 2 : PASS DE SAISON -->
            <div id="view-pass" class="view h-full w-full hidden flex-col bg-slate-800">
                <div class="p-4 border-b border-slate-700">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i class="ph-fill ph-star text-yellow-400"></i> Pass de Saison</h2>
                    <p class="text-xs text-slate-400 mt-1">Gagnez de l'XP en minant pour débloquer des récompenses.</p>
                </div>
                <!-- Container avec Overflow Horizontal -->
                <div class="flex-1 flex items-center overflow-x-auto hide-scrollbar snap-x snap-mandatory px-4 gap-4" id="pass-container">
                    <!-- Généré par JS -->
                </div>
            </div>

            <!-- VUE 3 : INVENTAIRE (COSMÉTIQUES) -->
            <div id="view-inventory" class="view h-full w-full hidden flex-col bg-slate-800">
                <div class="p-4 border-b border-slate-700">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i class="ph-fill ph-backpack text-green-400"></i> Cosmétiques</h2>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[10px] px-2 py-1 rounded bg-slate-700 text-typique border border-slate-600">Typique</span>
                        <span class="text-[10px] px-2 py-1 rounded bg-slate-700 text-rare border border-blue-500/50">Rare</span>
                        <span class="text-[10px] px-2 py-1 rounded bg-slate-700 text-legendaire border border-yellow-500/50">Légendaire</span>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 grid grid-cols-3 gap-3 content-start" id="inventory-container">
                    <!-- Généré par JS -->
                </div>
            </div>

            <!-- VUE 4 : BOUTIQUE -->
            <div id="view-shop" class="view h-full w-full hidden flex-col bg-slate-800">
                <div class="p-4 border-b border-slate-700 text-center">
                    <h2 class="text-xl font-bold flex items-center justify-center gap-2"><i class="ph-fill ph-storefront text-purple-400"></i> Boutique</h2>
                </div>
                <div class="flex-1 p-6 flex flex-col items-center justify-center gap-6">
                    <div class="w-full max-w-xs bg-slate-700 border-2 border-purple-500/50 rounded-2xl p-6 flex flex-col items-center text-center shadow-lg relative overflow-hidden">
                        <div class="absolute inset-0 bg-purple-500/10 animate-pulse"></div>
                        <i class="ph-fill ph-treasure-chest text-6xl text-purple-400 mb-2 relative z-10"></i>
                        <h3 class="font-bold text-lg relative z-10">Coffre Mystère</h3>
                        <p class="text-xs text-slate-300 mb-4 relative z-10">Contient un cosmétique aléatoire.</p>
                        <button onclick="buyChest()" class="relative z-10 w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg">
                            Ouvrir - 500 <i class="ph-fill ph-coins text-yellow-400"></i>
                        </button>
                    </div>
                </div>
            </div>

        </main>

        <!-- NAVIGATION BAS -->
        <nav class="bg-slate-800 border-t border-slate-700 pb-safe z-20">
            <ul class="flex justify-around items-center h-16">
                <li class="flex-1 h-full">
                    <button onclick="switchView('game')" id="nav-game" class="nav-btn w-full h-full flex flex-col items-center justify-center text-blue-400 gap-1 transition-colors">
                        <i class="ph-fill ph-hammer text-2xl"></i>
                        <span class="text-[10px] font-bold">Miner</span>
                    </button>
                </li>
                <li class="flex-1 h-full">
                    <button onclick="switchView('pass')" id="nav-pass" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 gap-1 transition-colors">
                        <i class="ph-fill ph-star text-2xl"></i>
                        <span class="text-[10px] font-bold">Pass</span>
                    </button>
                </li>
                <li class="flex-1 h-full">
                    <button onclick="switchView('inventory')" id="nav-inventory" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 gap-1 transition-colors">
                        <i class="ph-fill ph-backpack text-2xl"></i>
                        <span class="text-[10px] font-bold">Inventaire</span>
                    </button>
                </li>
                <li class="flex-1 h-full">
                    <button onclick="switchView('shop')" id="nav-shop" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 gap-1 transition-colors">
                        <i class="ph-fill ph-storefront text-2xl"></i>
                        <span class="text-[10px] font-bold">Boutique</span>
                    </button>
                </li>
            </ul>
        </nav>

        <!-- OVERLAYS / POPUPS -->

        <!-- Overlay Récompense (Coffre) -->
        <div id="reward-overlay" class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center backdrop-blur-sm p-4">
            <div id="reward-content" class="flex flex-col items-center scale-0 transition-transform duration-300">
                <div class="text-center mb-6">
                    <h2 class="text-3xl font-black uppercase tracking-wider text-white shadow-black drop-shadow-lg mb-2">Nouvel Objet !</h2>
                    <p id="reward-rarity" class="font-bold uppercase tracking-widest text-sm text-rare">Rare</p>
                </div>
                
                <div id="reward-card" class="w-48 h-48 rounded-2xl border-4 rarity-rare bg-rare flex items-center justify-center relative overflow-hidden mb-8 shadow-2xl">
                    <!-- Éclat de lumière -->
                    <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                    <i id="reward-icon" class="ph-fill ph-gem text-7xl text-white relative z-10 drop-shadow-md"></i>
                </div>

                <h3 id="reward-name" class="text-2xl font-bold mb-8 text-center">Cristal d'Eau</h3>

                <button onclick="closeReward()" class="bg-white text-black px-8 py-3 rounded-full font-bold active:scale-95 transition-transform shadow-lg">
                    Continuer
                </button>
            </div>
        </div>

        <!-- Overlay Paramètres -->
        <div id="settings-overlay" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center backdrop-blur-sm p-4">
            <div class="bg-slate-800 w-full max-w-sm rounded-2xl border border-slate-600 p-6 flex flex-col shadow-2xl animate-popup">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i class="ph-fill ph-gear"></i> Paramètres</h2>
                    <button onclick="toggleSettings()" class="text-slate-400 hover:text-white p-1">
                        <i class="ph-bold ph-x text-xl"></i>
                    </button>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-center p-3 bg-slate-700/50 rounded-lg">
                        <span class="font-medium">Sons et effets</span>
                        <div class="w-12 h-6 bg-blue-500 rounded-full relative cursor-pointer">
                            <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                        </div>
                    </div>
                    
                    <button onclick="resetGame()" class="w-full flex items-center justify-center gap-2 p-3 bg-red-500/10 text-red-400 border border-red-500/30 rounded-lg active:bg-red-500/20 transition-colors">
                        <i class="ph-bold ph-warning-circle"></i> Réinitialiser la partie
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- BASE DE DONNÉES DU JEU ---

        const RARITIES = {
            typique: { name: 'Typique', color: 'text-typique', bg: 'bg-typique', border: 'rarity-typique', chance: 70 },
            rare: { name: 'Rare', color: 'text-rare', bg: 'bg-rare', border: 'rarity-rare', chance: 25 },
            legendaire: { name: 'Légendaire', color: 'text-legendaire', bg: 'bg-legendaire', border: 'rarity-legendaire', chance: 5 }
        };

        const COSMETICS = [
            // Typiques (Cristaux basiques)
            { id: 'c_base', name: 'Cristal Cyan', type: 'crystal', rarity: 'typique', icon: 'ph-sketch-logo', colorClass: 'text-cyan-400' },
            { id: 'c_red', name: 'Cristal Rubis', type: 'crystal', rarity: 'typique', icon: 'ph-sketch-logo', colorClass: 'text-red-500' },
            { id: 'c_green', name: 'Cristal Émeraude', type: 'crystal', rarity: 'typique', icon: 'ph-sketch-logo', colorClass: 'text-emerald-500' },
            // Rares (Formes différentes)
            { id: 'c_star', name: 'Étoile Filante', type: 'crystal', rarity: 'rare', icon: 'ph-star-four', colorClass: 'text-yellow-300' },
            { id: 'c_moon', name: 'Croissant Lunaire', type: 'crystal', rarity: 'rare', icon: 'ph-moon', colorClass: 'text-blue-200' },
            { id: 'c_heart', name: 'Cœur de Vie', type: 'crystal', rarity: 'rare', icon: 'ph-heart', colorClass: 'text-pink-500' },
            // Légendaires (Objets spéciaux)
            { id: 'c_crown', name: 'Couronne du Roi', type: 'crystal', rarity: 'legendaire', icon: 'ph-crown', colorClass: 'text-yellow-500' },
            { id: 'c_diamond', name: 'Diamant Parfait', type: 'crystal', rarity: 'legendaire', icon: 'ph-diamond', colorClass: 'text-white' },
            { id: 'c_fire', name: 'Flamme Éternelle', type: 'crystal', rarity: 'legendaire', icon: 'ph-fire', colorClass: 'text-orange-500' }
        ];

        // Génération du Pass de Saison (20 niveaux)
        const PASS_TIERS = Array.from({length: 20}, (_, i) => {
            const level = i + 1;
            let rewardType = 'gold';
            let amount = level * 150;
            let cosmeticId = null;

            // Récompenses cosmétiques aux niveaux 5, 10, 15, 20
            if (level === 5) { rewardType = 'cosmetic'; cosmeticId = 'c_red'; }
            if (level === 10) { rewardType = 'cosmetic'; cosmeticId = 'c_star'; }
            if (level === 15) { rewardType = 'cosmetic'; cosmeticId = 'c_moon'; }
            if (level === 20) { rewardType = 'cosmetic'; cosmeticId = 'c_crown'; }

            return { id: `tier_${level}`, level, rewardType, amount, cosmeticId };
        });


        // --- ÉTAT DU JEU ---
        
        let state = {
            gold: 0,
            xp: 0,
            level: 1,
            inventory: ['c_base'], // ID des cosmétiques possédés
            equipped: { crystal: 'c_base' },
            passClaimed: [] // ID des tiers du pass récupérés
        };

        // --- SAUVEGARDE & CHARGEMENT ---
        
        function saveGame() {
            localStorage.setItem('cristalClickerSave', JSON.stringify(state));
        }

        function loadGame() {
            const saved = localStorage.getItem('cristalClickerSave');
            if (saved) {
                state = { ...state, ...JSON.parse(saved) };
            }
            updateUI();
            applyCosmetics();
        }

        function resetGame() {
            if(confirm("Voulez-vous vraiment tout effacer ? Cette action est irréversible.")) {
                localStorage.removeItem('cristalClickerSave');
                location.reload();
            }
        }


        // --- LOGIQUE PRINCIPALE ---

        function getXpRequired(lvl) {
            return Math.floor(100 * Math.pow(1.5, lvl - 1));
        }

        function addGold(amount) {
            state.gold += amount;
            document.getElementById('gold-display').innerText = state.gold;
            // Animation petit rebond
            const el = document.getElementById('gold-display').parentElement;
            el.classList.add('scale-110');
            setTimeout(() => el.classList.remove('scale-110'), 150);
            saveGame();
        }

        function addXp(amount) {
            state.xp += amount;
            let req = getXpRequired(state.level);
            
            while(state.xp >= req) {
                state.xp -= req;
                state.level++;
                req = getXpRequired(state.level);
                // Effet de level up
                document.getElementById('level-display').parentElement.classList.add('text-yellow-400');
                setTimeout(() => document.getElementById('level-display').parentElement.classList.remove('text-yellow-400'), 500);
                renderPass(); // Met à jour le pass si niveau gagné
            }
            updateUI();
            saveGame();
        }

        function updateUI() {
            document.getElementById('gold-display').innerText = state.gold;
            document.getElementById('level-display').innerText = state.level;
            
            const req = getXpRequired(state.level);
            document.getElementById('xp-display').innerText = Math.floor(state.xp);
            document.getElementById('xp-max-display').innerText = req;
            
            const pct = (state.xp / req) * 100;
            document.getElementById('xp-bar').style.width = `${pct}%`;
        }

        // Système de Clic
        const clickZone = document.getElementById('click-zone');
        clickZone.addEventListener('pointerdown', (e) => {
            // Ajouter ressources
            addGold(1);
            addXp(1);

            // Effet visuel du texte flottant
            const rect = clickZone.getBoundingClientRect();
            
            // Fallback si pas de coordonnées d'événement (ex: touch simulé bizzare)
            let x = e.clientX || rect.left + rect.width / 2;
            let y = e.clientY || rect.top + rect.height / 2;

            // Créer element texte
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerHTML = '+1 <i class="ph-fill ph-coins"></i>';
            text.style.left = `${x - 20}px`;
            text.style.top = `${y - 20}px`;
            
            document.body.appendChild(text);
            
            // Nettoyage après animation
            setTimeout(() => {
                text.remove();
            }, 800);
        });

        // --- SYSTÈME DE VUES & NAV ---

        const views = ['game', 'pass', 'inventory', 'shop'];
        function switchView(target) {
            views.forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`view-${v}`).classList.remove('flex');
                
                // Maj navbar couleurs
                const navIcon = document.getElementById(`nav-${v}`);
                navIcon.classList.remove('text-blue-400');
                navIcon.classList.add('text-slate-400');
            });

            document.getElementById(`view-${target}`).classList.remove('hidden');
            document.getElementById(`view-${target}`).classList.add('flex');
            
            const activeNav = document.getElementById(`nav-${target}`);
            activeNav.classList.remove('text-slate-400');
            activeNav.classList.add('text-blue-400');

            // Render spécifique si besoin
            if(target === 'pass') renderPass();
            if(target === 'inventory') renderInventory();
        }


        // --- BOUTIQUE / GACHA ---

        function buyChest() {
            if (state.gold >= 500) {
                addGold(-500);
                openRandomChest();
            } else {
                alert("Pas assez d'or !"); // Remplacé visuellement mais bon par sécurité
                // Animation erreur sur bouton
            }
        }

        function openRandomChest() {
            // Tirage rareté
            const rand = Math.random() * 100;
            let rarityTier = 'typique';
            if (rand < RARITIES.legendaire.chance) rarityTier = 'legendaire';
            else if (rand < RARITIES.legendaire.chance + RARITIES.rare.chance) rarityTier = 'rare';

            // Filtrer cosmétiques par rareté
            const pool = COSMETICS.filter(c => c.rarity === rarityTier);
            const item = pool[Math.floor(Math.random() * pool.length)];

            // Ajouter à l'inventaire si pas possédé (ou donner compensation, ici on ajoute juste)
            if (!state.inventory.includes(item.id)) {
                state.inventory.push(item.id);
                saveGame();
            } else {
                // Déjà possédé = compensation
                addGold(150);
            }

            showReward(item);
        }

        function showReward(item) {
            const overlay = document.getElementById('reward-overlay');
            const content = document.getElementById('reward-content');
            const rarityDef = RARITIES[item.rarity];

            document.getElementById('reward-name').innerText = item.name;
            document.getElementById('reward-rarity').innerText = rarityDef.name;
            document.getElementById('reward-rarity').className = `font-bold uppercase tracking-widest text-sm mb-4 ${rarityDef.color}`;
            
            const card = document.getElementById('reward-card');
            card.className = `w-48 h-48 rounded-2xl border-4 flex items-center justify-center relative overflow-hidden mb-8 shadow-2xl ${rarityDef.bg} ${rarityDef.border}`;
            
            const icon = document.getElementById('reward-icon');
            icon.className = `ph-fill ${item.icon} text-7xl text-white relative z-10 drop-shadow-md`;

            // Afficher
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            // Petite pause avant animation
            setTimeout(() => {
                content.style.transform = 'scale(1)';
            }, 10);
        }

        function closeReward() {
            const overlay = document.getElementById('reward-overlay');
            const content = document.getElementById('reward-content');
            content.style.transform = 'scale(0)';
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }, 300);
        }

        // --- PASS DE SAISON ---

        function renderPass() {
            const container = document.getElementById('pass-container');
            container.innerHTML = '';

            PASS_TIERS.forEach(tier => {
                const isUnlocked = state.level >= tier.level;
                const isClaimed = state.passClaimed.includes(tier.id);
                
                let rewardDisplay = '';
                if (tier.rewardType === 'gold') {
                    rewardDisplay = `<i class="ph-fill ph-coins text-3xl text-yellow-400 mb-2"></i><span class="font-bold text-sm">${tier.amount} Or</span>`;
                } else {
                    const item = COSMETICS.find(c => c.id === tier.cosmeticId);
                    const rarDef = RARITIES[item.rarity];
                    rewardDisplay = `<i class="ph-fill ${item.icon} text-4xl mb-1 ${rarDef.color}"></i><span class="text-[10px] text-center font-bold px-1">${item.name}</span>`;
                }

                // Construction de la carte (Widget)
                const card = document.createElement('div');
                card.className = `min-w-[120px] w-[120px] h-40 rounded-xl border-2 flex flex-col snap-center relative overflow-hidden transition-all ${
                    isClaimed ? 'bg-slate-800 border-slate-700 opacity-60' : 
                    isUnlocked ? 'bg-slate-700 border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.3)]' : 
                    'bg-slate-800/50 border-slate-700'
                }`;

                card.innerHTML = `
                    <div class="h-8 bg-slate-900/50 flex items-center justify-center text-xs font-bold border-b border-inherit">
                        Niveau ${tier.level}
                    </div>
                    <div class="flex-1 flex flex-col items-center justify-center p-2">
                        ${rewardDisplay}
                    </div>
                    ${!isUnlocked ? `<div class="absolute inset-0 bg-black/40 flex items-center justify-center backdrop-blur-[1px]"><i class="ph-fill ph-lock-key text-2xl text-slate-400"></i></div>` : ''}
                `;

                if (isUnlocked && !isClaimed) {
                    card.classList.add('cursor-pointer', 'active:scale-95');
                    card.onclick = () => claimTier(tier);
                }

                container.appendChild(card);
            });
        }

        function claimTier(tier) {
            if (state.passClaimed.includes(tier.id)) return;

            state.passClaimed.push(tier.id);
            
            if (tier.rewardType === 'gold') {
                addGold(tier.amount);
            } else if (tier.rewardType === 'cosmetic') {
                if (!state.inventory.includes(tier.cosmeticId)) {
                    state.inventory.push(tier.cosmeticId);
                }
                const item = COSMETICS.find(c => c.id === tier.cosmeticId);
                showReward(item);
            }

            saveGame();
            renderPass(); // Rafraichir UI
        }


        // --- INVENTAIRE & COSMÉTIQUES ---

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = '';

            // Trier par rareté pour l'affichage
            const sortedItems = [...COSMETICS].sort((a, b) => {
                const vals = { legendaire: 3, rare: 2, typique: 1 };
                return vals[b.rarity] - vals[a.rarity];
            });

            sortedItems.forEach(item => {
                const isOwned = state.inventory.includes(item.id);
                const isEquipped = state.equipped.crystal === item.id;
                const rarDef = RARITIES[item.rarity];

                const div = document.createElement('div');
                div.className = `aspect-square rounded-xl border-2 flex flex-col items-center justify-center relative p-2 transition-all ${
                    isOwned ? `${rarDef.bg} ${rarDef.border} cursor-pointer active:scale-95` : 'bg-slate-800/50 border-slate-700 grayscale opacity-40'
                } ${isEquipped ? 'ring-4 ring-white shadow-[0_0_20px_white]' : ''}`;

                div.innerHTML = `
                    <i class="ph-fill ${item.icon} text-4xl text-white drop-shadow-md mb-1"></i>
                    <span class="text-[9px] font-bold text-center leading-tight text-white">${item.name}</span>
                    ${!isOwned ? `<i class="ph-fill ph-lock-key absolute bottom-1 right-1 text-slate-400"></i>` : ''}
                    ${isEquipped ? `<div class="absolute -top-2 -right-2 bg-green-500 rounded-full p-1"><i class="ph-bold ph-check text-xs"></i></div>` : ''}
                `;

                if (isOwned) {
                    div.onclick = () => equipItem(item);
                }

                container.appendChild(div);
            });
        }

        function equipItem(item) {
            state.equipped.crystal = item.id;
            saveGame();
            applyCosmetics();
            renderInventory(); // Refresh highlight
        }

        function applyCosmetics() {
            const equippedId = state.equipped.crystal;
            const item = COSMETICS.find(c => c.id === equippedId) || COSMETICS[0];
            
            const mainCrystal = document.getElementById('main-crystal');
            // Reset classes
            mainCrystal.className = `ph-fill ${item.icon} text-9xl ${item.colorClass} animate-float`;
            
            // Effet brillance selon rareté
            if(item.rarity === 'legendaire') {
                mainCrystal.classList.add('drop-shadow-[0_0_40px_rgba(251,191,36,0.8)]');
            } else if (item.rarity === 'rare') {
                mainCrystal.classList.add('drop-shadow-[0_0_30px_rgba(59,130,246,0.8)]');
            } else {
                mainCrystal.classList.add('drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]');
            }
        }


        // --- PARAMÈTRES / OVERLAYS ---

        function toggleSettings() {
            const overlay = document.getElementById('settings-overlay');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
            } else {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }


        // --- INIT ---

        window.onload = () => {
            loadGame();
            // Prévenir le comportement par défaut (scroll elastic sur iOS)
            document.addEventListener('touchmove', function(e) {
                // Seulement si ce n'est pas dans un container scrollable
                if (!e.target.closest('.overflow-y-auto') && !e.target.closest('.overflow-x-auto')) {
                    e.preventDefault();
                }
            }, { passive: false });
        };

    </script>
</body>
</html>
