<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRC P2P - Connexion Directe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: #0a0a0c;
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .irc-container {
            background: #111114;
            border-right: 1px solid #27272a;
        }

        .message-line:hover {
            background: rgba(255,255,255,0.02);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        .btn-masculine {
            background: #2563eb;
            transition: all 0.2s;
        }
        .btn-masculine:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-masculine:active { transform: translateY(0); }

        #room-link-display {
            word-break: break-all;
            user-select: all;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <!-- Ecran de Configuration Initiale -->
    <div id="setup-screen" class="fixed inset-0 z-50 bg-[#0a0a0c] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#111114] border border-[#27272a] p-8 rounded-lg shadow-2xl">
            <h1 class="text-2xl font-black mb-6 text-white tracking-tight border-b border-blue-600 pb-2 flex items-center gap-3">
                <i class="fa-solid fa-network-wired text-blue-500"></i> IRC P2P ENGINE
            </h1>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Pseudo</label>
                    <input type="text" id="username-input" maxlength="15" 
                        class="w-full bg-[#18181b] border border-[#27272a] rounded px-4 py-3 text-white focus:border-blue-500 outline-none mono"
                        placeholder="Utilisateur_XYZ">
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <button id="btn-create" class="btn-masculine text-white font-bold py-3 rounded uppercase text-sm tracking-wider">
                        Créer un nouveau salon
                    </button>
                    <div class="relative flex items-center">
                        <div class="flex-grow border-t border-[#27272a]"></div>
                        <span class="flex-shrink mx-4 text-gray-600 text-xs font-bold uppercase">Ou rejoindre</span>
                        <div class="flex-grow border-t border-[#27272a]"></div>
                    </div>
                    <input type="text" id="join-id-input" 
                        class="w-full bg-[#18181b] border border-[#27272a] rounded px-4 py-2 text-white focus:border-blue-500 outline-none text-sm mono"
                        placeholder="Coller l'ID du salon ici">
                    <button id="btn-join" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 rounded uppercase text-sm tracking-wider transition-all">
                        Se connecter à l'hôte
                    </button>
                </div>
            </div>
            <p class="mt-8 text-[10px] text-gray-600 text-center leading-relaxed">
                Technologie WebRTC : Les messages ne transitent par aucun serveur.<br>Anonymat total et gratuité illimitée.
            </p>
        </div>
    </div>

    <!-- Interface IRC Principale -->
    <div id="main-interface" class="hidden flex-1 flex flex-col h-full">
        
        <!-- Top Bar -->
        <header class="h-12 bg-[#18181b] border-b border-[#27272a] flex items-center justify-between px-4 shrink-0">
            <div class="flex items-center gap-4">
                <span class="text-blue-500 font-bold mono text-sm">#P2P-CHANNEL</span>
                <span id="status-tag" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-0.5 rounded border border-red-500/20 font-bold uppercase tracking-widest">Déconnecté</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex items-center bg-black/40 border border-white/5 rounded px-2 py-1 gap-2">
                    <span class="text-[10px] text-gray-500 font-bold uppercase">ID SALON:</span>
                    <span id="room-id-display" class="text-[10px] text-blue-400 mono select-all cursor-pointer">Génération...</span>
                </div>
                <button id="btn-copy-id" class="text-gray-400 hover:text-white" title="Copier l'ID"><i class="fa-solid fa-copy"></i></button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Messages -->
            <div id="chat-window" class="flex-1 flex flex-col bg-[#0a0a0c]">
                <div id="messages-list" class="flex-1 overflow-y-auto p-4 custom-scroll mono text-[13px] leading-relaxed">
                    <div class="text-zinc-600 mb-4 border-b border-zinc-900 pb-2">*** Session IRC P2P démarrée. En attente de pairs...</div>
                </div>
                
                <!-- Input Area -->
                <div class="p-4 bg-[#111114] border-t border-[#27272a]">
                    <form id="input-form" class="flex gap-3">
                        <span class="hidden sm:inline-block py-2 text-zinc-500 font-bold" id="prompt-name">&gt;</span>
                        <input type="text" id="msg-input" autocomplete="off"
                            class="flex-1 bg-transparent text-white outline-none placeholder:text-zinc-700" 
                            placeholder="Écrire un message...">
                        <button type="submit" class="text-blue-500 hover:text-blue-400 font-bold uppercase text-xs tracking-widest">Envoyer</button>
                    </form>
                </div>
            </div>

            <!-- Users Sidebar -->
            <aside class="w-48 bg-[#111114] border-l border-[#27272a] hidden md:flex flex-col">
                <div class="p-3 border-b border-[#27272a] text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                    Utilisateurs (<span id="user-count">0</span>)
                </div>
                <div id="users-list" class="flex-1 overflow-y-auto p-2 space-y-1 mono text-sm">
                    <!-- Users injected here -->
                </div>
            </aside>
        </div>
    </div>

    <script>
        // Palette de couleurs "Masculines" (Bleus, Gris, Verts sombres, Oranges, Ambre)
        const COLORS = ['#60a5fa', '#34d399', '#fbbf24', '#f87171', '#818cf8', '#2dd4bf', '#fb923c', '#94a3b8', '#4ade80'];

        let peer = null;
        let connections = []; // Pour l'hôte : liste des clients. Pour le client : connexion à l'hôte.
        let isHost = false;
        let myUsername = "Anonyme";
        let userList = new Set();

        const els = {
            setup: document.getElementById('setup-screen'),
            main: document.getElementById('main-interface'),
            username: document.getElementById('username-input'),
            joinId: document.getElementById('join-id-input'),
            btnCreate: document.getElementById('btn-create'),
            btnJoin: document.getElementById('btn-join'),
            messages: document.getElementById('messages-list'),
            input: document.getElementById('msg-input'),
            form: document.getElementById('input-form'),
            status: document.getElementById('status-tag'),
            roomId: document.getElementById('room-id-display'),
            users: document.getElementById('users-list'),
            count: document.getElementById('user-count'),
            prompt: document.getElementById('prompt-name')
        };

        const getColor = (name) => {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return COLORS[Math.abs(hash) % COLORS.length];
        };

        const addLog = (content, type = 'sys') => {
            const div = document.createElement('div');
            div.className = "message-line py-0.5";
            const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            
            if (type === 'sys') {
                div.innerHTML = `<span class="text-zinc-600">[${time}] *** ${content}</span>`;
            } else {
                const color = getColor(content.user);
                div.innerHTML = `
                    <span class="text-zinc-700">[${time}]</span> 
                    <span style="color: ${color}" class="font-bold">&lt;${content.user}&gt;</span> 
                    <span class="text-zinc-300">${content.text}</span>
                `;
            }
            els.messages.appendChild(div);
            els.messages.scrollTop = els.messages.scrollHeight;
        };

        const updateUIUsers = () => {
            els.users.innerHTML = '';
            userList.forEach(u => {
                const item = document.createElement('div');
                item.className = "text-zinc-400 px-2 py-1 rounded";
                item.innerHTML = `<span style="color: ${getColor(u)}">@</span> ${u}`;
                els.users.appendChild(item);
            });
            els.count.textContent = userList.size;
        };

        const initPeer = () => {
            peer = new Peer();
            
            peer.on('open', (id) => {
                els.roomId.textContent = id;
                els.status.textContent = "Connecté";
                els.status.classList.replace('bg-red-900/30', 'bg-emerald-900/30');
                els.status.classList.replace('text-red-400', 'text-emerald-400');
                els.status.classList.add('border-emerald-500/20');
                
                if (isHost) {
                    userList.add(myUsername);
                    updateUIUsers();
                }
            });

            peer.on('connection', (conn) => {
                if (!isHost) {
                    conn.close();
                    return;
                }
                
                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        connections.push(conn);
                        userList.add(data.user);
                        addLog(`${data.user} a rejoint le canal.`);
                        broadcast({ type: 'sys', text: `${data.user} a rejoint.` });
                        broadcast({ type: 'users', list: Array.from(userList) });
                        updateUIUsers();
                    }
                    if (data.type === 'msg') {
                        addLog({ user: data.user, text: data.text }, 'user');
                        broadcast(data);
                    }
                });

                conn.on('close', () => {
                    // Logique de déconnexion simplifiée
                    connections = connections.filter(c => c !== conn);
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                alert("Erreur PeerJS: " + err.type);
            });
        };

        const broadcast = (data) => {
            connections.forEach(conn => {
                if (conn.open) conn.send(data);
            });
        };

        // --- ACTIONS ---

        els.btnCreate.onclick = () => {
            const name = els.username.value.trim();
            if (!name) return alert("Pseudo requis");
            myUsername = name;
            isHost = true;
            els.prompt.textContent = `<${myUsername}>`;
            initPeer();
            els.setup.classList.add('hidden');
            els.main.classList.remove('hidden');
        };

        els.btnJoin.onclick = () => {
            const name = els.username.value.trim();
            const hostId = els.joinId.value.trim();
            if (!name || !hostId) return alert("Pseudo et ID Salon requis");
            
            myUsername = name;
            isHost = false;
            els.prompt.textContent = `<${myUsername}>`;
            
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(hostId);
                conn.on('open', () => {
                    connections = [conn];
                    conn.send({ type: 'join', user: myUsername });
                    els.setup.classList.add('hidden');
                    els.main.classList.remove('hidden');
                    els.status.textContent = "Connecté à l'hôte";
                    els.status.classList.replace('bg-red-900/30', 'bg-blue-900/30');
                    els.status.classList.replace('text-red-400', 'text-blue-400');
                });

                conn.on('data', (data) => {
                    if (data.type === 'users') {
                        userList = new Set(data.list);
                        updateUIUsers();
                    }
                    if (data.type === 'msg') {
                        addLog({ user: data.user, text: data.text }, 'user');
                    }
                    if (data.type === 'sys') {
                        addLog(data.text);
                    }
                });
            });
        };

        els.form.onsubmit = (e) => {
            e.preventDefault();
            const text = els.input.value.trim();
            if (!text) return;
            
            const payload = { type: 'msg', user: myUsername, text: text };
            
            if (isHost) {
                addLog({ user: myUsername, text: text }, 'user');
                broadcast(payload);
            } else {
                connections[0].send(payload);
                addLog({ user: myUsername, text: text }, 'user');
            }
            
            els.input.value = '';
        };

        document.getElementById('btn-copy-id').onclick = () => {
            const id = els.roomId.textContent;
            navigator.clipboard.writeText(id).then(() => {
                alert("ID Salon copié ! Partagez-le avec vos amis.");
            });
        };
    </script>
</body>
</html>
