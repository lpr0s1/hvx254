<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IRC P2P Connect</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            background-color: #09090b;
            color: #e4e4e7;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .app-height {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message-line {
            padding: 4px 12px;
            transition: background 0.2s;
            border-left: 2px solid transparent;
        }
        
        .message-line:active { background: rgba(255,255,255,0.05); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        input, button { font-size: 16px !important; } /* Empêche le zoom auto sur iOS */

        .safe-pb { padding-bottom: var(--safe-bottom); }
        .safe-pt { padding-top: var(--safe-top); }

        /* Animation de chargement */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="app-height">

    <!-- Écran d'accueil / Setup -->
    <div id="setup-screen" class="fixed inset-0 z-50 bg-[#09090b] flex items-center justify-center p-6 safe-pt safe-pb">
        <div class="w-full max-w-md space-y-8 animate__animated animate__fadeIn">
            <div class="text-center">
                <div class="inline-flex p-4 rounded-2xl bg-blue-600/10 border border-blue-500/20 text-blue-500 text-4xl mb-4">
                    <i class="fa-solid fa-cloud-bolt"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">IRC P2P</h1>
                <p class="text-zinc-500 text-sm mt-2 uppercase tracking-widest font-bold">Connexion Directe & Privée</p>
            </div>

            <div class="bg-[#121215] border border-white/5 p-6 rounded-3xl shadow-2xl space-y-4">
                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase ml-1">Ton Pseudo</label>
                    <input type="text" id="username-input" maxlength="12" 
                        class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl px-5 py-4 text-white focus:border-blue-500 outline-none transition-all"
                        placeholder="Ex: Ghost_99">
                </div>

                <div class="pt-2 space-y-3">
                    <button id="btn-create" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2">
                        <span>Créer un salon</span>
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                    
                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-zinc-800"></div>
                        <span class="mx-4 text-zinc-600 text-[10px] font-bold uppercase">Rejoindre</span>
                        <div class="flex-grow border-t border-zinc-800"></div>
                    </div>

                    <input type="text" id="join-id-input" 
                        class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl px-5 py-3 text-white text-center mono text-sm focus:border-blue-500 outline-none"
                        placeholder="ID du salon">
                    
                    <button id="btn-join" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-4 rounded-2xl transition-all">
                        Se connecter
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Interface principale -->
    <div id="main-interface" class="hidden flex-1 flex flex-col overflow-hidden">
        
        <!-- Header -->
        <header class="glass-panel px-4 py-3 safe-pt flex items-center justify-between z-40">
            <div class="flex items-center gap-3">
                <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-zinc-600 shadow-sm"></div>
                <div>
                    <h2 class="text-sm font-black text-white uppercase tracking-tight">#Direct-Channel</h2>
                    <p id="room-id-display" class="text-[9px] text-zinc-500 mono select-all cursor-pointer">ID: --</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="btn-copy" class="w-10 h-10 flex items-center justify-center rounded-xl bg-zinc-800/50 text-zinc-400 active:scale-90 transition-all">
                    <i class="fa-solid fa-share-nodes"></i>
                </button>
                <button id="btn-reset" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-900/10 text-red-500 border border-red-500/10 active:scale-90 transition-all">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="flex-1 flex overflow-hidden">
            <main class="flex-1 flex flex-col bg-[#09090b]">
                <div id="messages-list" class="flex-1 overflow-y-auto py-4 custom-scroll mono text-[13px]">
                    <!-- Les messages arrivent ici -->
                </div>
                
                <!-- Zone de saisie -->
                <div class="p-3 sm:p-4 bg-zinc-900/30 border-t border-white/5 safe-pb">
                    <form id="input-form" class="flex gap-2 max-w-5xl mx-auto">
                        <input type="text" id="msg-input" autocomplete="off"
                            class="flex-1 bg-zinc-800/50 border border-zinc-700 rounded-2xl px-4 py-3 text-white outline-none focus:border-blue-500 transition-all" 
                            placeholder="Message...">
                        <button type="submit" class="w-12 h-12 bg-blue-600 rounded-2xl text-white flex items-center justify-center shadow-lg shadow-blue-600/10 active:scale-90 transition-all">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </main>

            <!-- Sidebar Users (cachée sur petit mobile) -->
            <aside id="sidebar" class="hidden md:flex w-56 flex-col border-l border-white/5 bg-[#0c0c0e]">
                <div class="p-4 border-b border-white/5 text-[10px] font-black text-zinc-500 uppercase tracking-widest flex justify-between">
                    <span>Membres</span>
                    <span id="user-count" class="text-blue-500">0</span>
                </div>
                <div id="users-list" class="flex-1 overflow-y-auto p-3 space-y-2 mono text-sm"></div>
            </aside>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 px-4 py-2 bg-zinc-800 text-white text-xs font-bold rounded-full shadow-2xl border border-white/10 opacity-0 transition-opacity pointer-events-none z-[100]"></div>

    <script>
        const COLORS = ['#60a5fa', '#34d399', '#fbbf24', '#f87171', '#818cf8', '#2dd4bf', '#fb923c', '#94a3b8', '#4ade80', '#0ea5e9'];
        
        let peer = null;
        let connections = [];
        let isHost = false;
        let myUsername = localStorage.getItem('irc_user') || "";
        let userList = new Set();
        let lastRoomId = localStorage.getItem('irc_last_room') || "";

        const els = {
            setup: document.getElementById('setup-screen'),
            main: document.getElementById('main-interface'),
            username: document.getElementById('username-input'),
            joinId: document.getElementById('join-id-input'),
            btnCreate: document.getElementById('btn-create'),
            btnJoin: document.getElementById('btn-join'),
            messages: document.getElementById('messages-list'),
            input: document.getElementById('msg-input'),
            form: document.getElementById('input-form'),
            status: document.getElementById('status-indicator'),
            roomId: document.getElementById('room-id-display'),
            users: document.getElementById('users-list'),
            count: document.getElementById('user-count'),
            toast: document.getElementById('toast'),
            btnReset: document.getElementById('btn-reset'),
            btnCopy: document.getElementById('btn-copy')
        };

        if (myUsername) els.username.value = myUsername;
        if (lastRoomId) els.joinId.value = lastRoomId;

        const showToast = (msg) => {
            els.toast.textContent = msg;
            els.toast.style.opacity = "1";
            setTimeout(() => els.toast.style.opacity = "0", 3000);
        };

        const getColor = (name) => {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return COLORS[Math.abs(hash) % COLORS.length];
        };

        const addLog = (content, type = 'sys') => {
            const div = document.createElement('div');
            div.className = "message-line";
            const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            
            if (type === 'sys') {
                div.innerHTML = `<span class="text-zinc-600 italic text-[11px]">[${time}] • ${content}</span>`;
            } else {
                const color = getColor(content.user);
                div.innerHTML = `
                    <span class="text-zinc-700 text-[10px] mr-1">${time}</span> 
                    <span style="color: ${color}" class="font-bold tracking-tight">&lt;${content.user}&gt;</span> 
                    <span class="text-zinc-300 ml-1">${content.text}</span>
                `;
            }
            els.messages.appendChild(div);
            els.messages.scrollTop = els.messages.scrollHeight;
        };

        const updateUIUsers = () => {
            els.users.innerHTML = '';
            userList.forEach(u => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-2 text-zinc-400 py-1";
                item.innerHTML = `<span class="w-1.5 h-1.5 rounded-full" style="background:${getColor(u)}"></span> <span class="truncate">${u}</span>`;
                els.users.appendChild(item);
            });
            els.count.textContent = userList.size;
        };

        const startPeer = (id = null) => {
            peer = new Peer(id);
            
            peer.on('open', (id) => {
                els.roomId.textContent = `ID: ${id}`;
                localStorage.setItem('irc_last_room', id);
                els.status.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]";
                
                if (isHost) {
                    userList.add(myUsername);
                    updateUIUsers();
                    addLog("Salon créé. Prêt pour les connexions.");
                }
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    // L'hôte reçoit une demande
                    conn.on('data', (data) => {
                        if (data.type === 'join') {
                            connections.push(conn);
                            userList.add(data.user);
                            addLog(`${data.user} a rejoint.`, 'sys');
                            broadcast({ type: 'sys', text: `${data.user} est là.` });
                            broadcast({ type: 'users', list: Array.from(userList) });
                            updateUIUsers();
                        }
                        if (data.type === 'msg') {
                            addLog({ user: data.user, text: data.text }, 'user');
                            broadcast(data); // Rediffuse à tout le monde
                        }
                    });
                });
            });

            peer.on('error', (err) => {
                showToast("Erreur de connexion");
                console.error(err);
                if (err.type === 'peer-unavailable') {
                    addLog("L'hôte est introuvable ou déconnecté.", 'sys');
                    resetSession();
                }
            });
        };

        const broadcast = (data) => {
            connections.forEach(c => { if(c.open) c.send(data); });
        };

        const resetSession = () => {
            localStorage.removeItem('irc_last_room');
            if (peer) peer.destroy();
            window.location.reload();
        };

        // --- EVENTS ---

        els.btnCreate.onclick = () => {
            const name = els.username.value.trim();
            if (name.length < 2) return showToast("Pseudo trop court");
            myUsername = name;
            localStorage.setItem('irc_user', myUsername);
            isHost = true;
            els.setup.classList.add('hidden');
            els.main.classList.remove('hidden');
            startPeer();
        };

        els.btnJoin.onclick = () => {
            const name = els.username.value.trim();
            const hostId = els.joinId.value.trim();
            if (!name || !hostId) return showToast("Pseudo et ID requis");
            
            myUsername = name;
            localStorage.setItem('irc_user', myUsername);
            isHost = false;
            
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(hostId);
                conn.on('open', () => {
                    connections = [conn];
                    conn.send({ type: 'join', user: myUsername });
                    els.setup.classList.add('hidden');
                    els.main.classList.remove('hidden');
                    els.status.className = "w-2.5 h-2.5 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.4)]";
                    addLog("Connecté au salon hôte.", 'sys');
                });

                conn.on('data', (data) => {
                    if (data.type === 'users') {
                        userList = new Set(data.list);
                        updateUIUsers();
                    }
                    if (data.type === 'msg') addLog({ user: data.user, text: data.text }, 'user');
                    if (data.type === 'sys') addLog(data.text, 'sys');
                });

                conn.on('close', () => {
                    addLog("Connexion perdue avec l'hôte.", 'sys');
                    showToast("Hôte déconnecté");
                });
            });
        };

        els.form.onsubmit = (e) => {
            e.preventDefault();
            const text = els.input.value.trim();
            if (!text) return;
            
            const payload = { type: 'msg', user: myUsername, text: text };
            
            if (isHost) {
                addLog({ user: myUsername, text: text }, 'user');
                broadcast(payload);
            } else if (connections[0] && connections[0].open) {
                connections[0].send(payload);
                addLog({ user: myUsername, text: text }, 'user');
            } else {
                showToast("Non connecté");
            }
            els.input.value = '';
        };

        els.btnCopy.onclick = () => {
            const idStr = els.roomId.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(idStr).then(() => showToast("ID copié !"));
        };

        els.btnReset.onclick = () => {
            if(confirm("Se déconnecter et supprimer les données ?")) {
                resetSession();
            }
        };

        // Gestion auto de la taille du clavier sur mobile
        window.addEventListener('resize', () => {
            els.messages.scrollTop = els.messages.scrollHeight;
        });

    </script>
</body>
</html>
