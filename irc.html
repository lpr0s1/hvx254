<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IRC P2P Direct</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #09090b;
            color: #e4e4e7;
            font-family: 'Inter', sans-serif;
            position: fixed; /* Empêche le rebond élastique sur iOS */
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Layout principal */
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #messages-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 10px 0;
        }

        .message-line {
            padding: 4px 16px;
            word-break: break-word;
            font-size: 13px;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: #09090b;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Fix pour les inputs sur iOS */
        input { font-size: 16px !important; }

        .btn-active:active { transform: scale(0.96); }
        
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Écran de Setup -->
        <div id="setup-screen" class="fixed inset-0 z-[200] bg-[#09090b] flex items-center justify-center p-6">
            <div class="w-full max-w-sm space-y-6">
                <div class="text-center space-y-2">
                    <div class="inline-flex p-3 rounded-2xl bg-blue-600/20 border border-blue-500/30 text-blue-500 text-3xl mb-2">
                        <i class="fa-solid fa-tower-broadcast"></i>
                    </div>
                    <h1 class="text-2xl font-black text-white">IRC P2P</h1>
                    <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Temps réel • Sans inscription</p>
                </div>

                <div class="space-y-4">
                    <input type="text" id="username-input" maxlength="12" 
                        class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-4 text-white focus:border-blue-500 outline-none"
                        placeholder="Ton pseudo">

                    <div class="grid grid-cols-1 gap-3">
                        <button id="btn-create" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl btn-active transition-all">
                            Créer un salon
                        </button>
                        
                        <div class="flex items-center gap-3 py-1">
                            <div class="flex-grow border-t border-zinc-800"></div>
                            <span class="text-zinc-600 text-[10px] font-bold uppercase">Ou rejoindre</span>
                            <div class="flex-grow border-t border-zinc-800"></div>
                        </div>

                        <input type="text" id="join-id-input" 
                            class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-3 text-white text-center mono text-sm focus:border-blue-500 outline-none"
                            placeholder="ID du salon">
                        
                        <button id="btn-join" class="w-full bg-zinc-800 text-white font-bold py-4 rounded-2xl btn-active transition-all">
                            Se connecter
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Interface de Chat -->
        <div id="main-interface" class="hidden flex-1 flex flex-col overflow-hidden">
            
            <!-- Chargement interne -->
            <div id="loader" class="loading-overlay hidden">
                <i class="fa-solid fa-circle-notch text-blue-500 text-3xl spinning"></i>
                <p class="text-zinc-500 text-xs mt-4 font-bold uppercase tracking-widest">Connexion au réseau...</p>
            </div>

            <!-- Header -->
            <header class="h-14 flex items-center justify-between px-4 border-b border-white/5 bg-zinc-900/50">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-zinc-600"></div>
                    <div>
                        <div class="text-[11px] font-black text-white uppercase leading-none">Canal P2P</div>
                        <div id="room-display" class="text-[9px] text-zinc-500 mono mt-1">ID: --</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-copy" class="w-9 h-9 flex items-center justify-center rounded-xl bg-zinc-800 text-zinc-400 btn-active">
                        <i class="fa-solid fa-copy text-sm"></i>
                    </button>
                    <button id="btn-reset" class="w-9 h-9 flex items-center justify-center rounded-xl bg-red-900/10 text-red-500 border border-red-500/10 btn-active">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                </div>
            </header>

            <div class="chat-container">
                <div id="messages-list" class="mono"></div>
                
                <!-- Input bar -->
                <div class="p-3 bg-zinc-900/80 border-t border-white/5">
                    <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
                        <input type="text" id="chat-input" autocomplete="off"
                            class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500" 
                            placeholder="Message...">
                        <button type="submit" class="w-12 h-12 bg-blue-600 rounded-xl text-white flex items-center justify-center shadow-lg btn-active">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 px-4 py-2 bg-zinc-800 text-white text-[10px] font-bold rounded-full shadow-2xl border border-white/10 opacity-0 transition-opacity pointer-events-none z-[300]"></div>

    <script>
        let peer = null;
        let connections = [];
        let isHost = false;
        let myUsername = localStorage.getItem('irc_user') || "";
        let currentRoomId = "";

        const els = {
            setup: document.getElementById('setup-screen'),
            main: document.getElementById('main-interface'),
            loader: document.getElementById('loader'),
            username: document.getElementById('username-input'),
            joinId: document.getElementById('join-id-input'),
            btnCreate: document.getElementById('btn-create'),
            btnJoin: document.getElementById('btn-join'),
            messages: document.getElementById('messages-list'),
            input: document.getElementById('chat-input'),
            form: document.getElementById('chat-form'),
            status: document.getElementById('status-dot'),
            room: document.getElementById('room-display'),
            toast: document.getElementById('toast'),
            btnReset: document.getElementById('btn-reset'),
            btnCopy: document.getElementById('btn-copy')
        };

        if (myUsername) els.username.value = myUsername;

        const notify = (msg) => {
            els.toast.textContent = msg;
            els.toast.style.opacity = "1";
            setTimeout(() => els.toast.style.opacity = "0", 3000);
        };

        const addMessage = (user, text, isSys = false) => {
            const div = document.createElement('div');
            div.className = "message-line";
            const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            
            if (isSys) {
                div.innerHTML = `<span class="text-zinc-600 italic">[${time}] • ${user}</span>`;
            } else {
                const colors = ['#60a5fa', '#34d399', '#fbbf24', '#f87171', '#818cf8', '#fb923c'];
                const hash = user.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const color = colors[hash % colors.length];
                div.innerHTML = `<span class="text-zinc-700 mr-1">${time}</span> <span style="color:${color}" class="font-bold">&lt;${user}&gt;</span> <span class="text-zinc-300 ml-1">${text}</span>`;
            }
            els.messages.appendChild(div);
            els.messages.scrollTop = els.messages.scrollHeight;
        };

        const initPeer = (hostToJoin = null) => {
            els.loader.classList.remove('hidden');
            els.setup.classList.add('hidden');
            els.main.classList.remove('hidden');

            peer = new Peer();

            peer.on('open', (id) => {
                if (hostToJoin) {
                    const conn = peer.connect(hostToJoin);
                    setupConn(conn);
                } else {
                    isHost = true;
                    currentRoomId = id;
                    els.room.textContent = `ID: ${id}`;
                    els.loader.classList.add('hidden');
                    els.status.className = "w-2 h-2 rounded-full bg-emerald-500";
                    addMessage("Salon créé avec succès.", null, true);
                }
            });

            peer.on('connection', (conn) => {
                setupConn(conn);
            });

            peer.on('error', (err) => {
                console.error(err);
                notify("Erreur de connexion.");
                setTimeout(() => location.reload(), 2000);
            });
        };

        const setupConn = (conn) => {
            conn.on('open', () => {
                if (!isHost) {
                    els.loader.classList.add('hidden');
                    els.status.className = "w-2 h-2 rounded-full bg-blue-500";
                    els.room.textContent = `ID: ${conn.peer}`;
                    addMessage("Connecté au salon.", null, true);
                }
                
                connections.push(conn);
                conn.send({ type: 'join', user: myUsername });

                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        addMessage(`${data.user} a rejoint.`, null, true);
                    } else if (data.type === 'msg') {
                        addMessage(data.user, data.text);
                        if (isHost) {
                            // L'hôte rediffuse
                            connections.forEach(c => {
                                if (c.peer !== conn.peer) c.send(data);
                            });
                        }
                    }
                });
            });

            conn.on('close', () => {
                connections = connections.filter(c => c.peer !== conn.peer);
                if (!isHost) {
                    notify("Salon fermé par l'hôte.");
                    location.reload();
                }
            });
        };

        els.btnCreate.onclick = () => {
            const name = els.username.value.trim();
            if (!name) return notify("Pseudo requis");
            myUsername = name;
            localStorage.setItem('irc_user', name);
            initPeer();
        };

        els.btnJoin.onclick = () => {
            const name = els.username.value.trim();
            const hostId = els.joinId.value.trim();
            if (!name || !hostId) return notify("Pseudo et ID requis");
            myUsername = name;
            localStorage.setItem('irc_user', name);
            initPeer(hostId);
        };

        els.form.onsubmit = (e) => {
            e.preventDefault();
            const text = els.input.value.trim();
            if (!text) return;

            const msg = { type: 'msg', user: myUsername, text: text };
            addMessage(myUsername, text);
            
            connections.forEach(c => {
                if (c.open) c.send(msg);
            });

            els.input.value = '';
            els.input.focus();
        };

        els.btnCopy.onclick = () => {
            const id = els.room.textContent.replace('ID: ', '');
            navigator.clipboard.writeText(id).then(() => notify("ID Copié !"));
        };

        els.btnReset.onclick = () => {
            if (confirm("Voulez-vous quitter ce salon ?")) {
                location.reload();
            }
        };

        // Fix resize mobile
        window.addEventListener('resize', () => {
            els.messages.scrollTop = els.messages.scrollHeight;
        });

    </script>
</body>
</html>
