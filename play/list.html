
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HZ DRIVE - SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;900&display=swap');

        :root {
            --accent: #00f2ff;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        .hz-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 50vw;
            opacity: 0.04;
            z-index: 0;
            pointer-events: none;
            user-select: none;
            letter-spacing: -2vw;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #warp-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .hidden-view {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
            filter: blur(20px);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-3px, -2px); }
            80% { transform: translate(3px, 2px); }
            100% { transform: translate(0); }
        }
        .glitch-effect { animation: glitch 0.15s infinite; }

        .loading-bar {
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            width: 0%;
            transition: width 0.2s;
        }
    </style>
</head>
<body class="bg-black">

    <canvas id="warp-canvas"></canvas>
    <div class="hz-bg">HZ</div>

    <!-- ECRAN D'INTRODUCTION -->
    <div id="intro" class="view z-[100] items-center justify-center bg-black p-10">
        <div class="text-center mb-16 space-y-4">
            <h1 class="text-6xl font-black italic tracking-tighter">HZ</h1>
            <p class="text-[10px] tracking-[0.7em] opacity-30 uppercase">CarPlay Adapt System</p>
        </div>
        
        <button id="launch-btn" class="group relative">
            <div class="absolute inset-0 bg-[var(--accent)] opacity-20 rounded-full blur-3xl group-active:opacity-40 transition"></div>
            <div class="w-32 h-32 rounded-full border-2 border-white/10 flex items-center justify-center glass relative active:scale-90 transition-all duration-300">
                <i data-lucide="play" class="w-14 h-14 fill-white ml-2"></i>
            </div>
            <p class="mt-10 text-[10px] tracking-[0.4em] uppercase opacity-50 font-bold">Démarrer le moteur</p>
        </button>
    </div>

    <!-- INTERFACE LECTEUR -->
    <div id="main" class="view hidden-view z-50 p-6 pt-12">
        <header class="flex justify-between items-center mb-10 px-2">
            <div class="flex gap-6">
                <button id="mode-night" class="text-sm font-black uppercase tracking-widest text-[var(--accent)] border-b-2 border-[var(--accent)] pb-1">Night</button>
                <button id="mode-phonk" class="text-sm font-black uppercase tracking-widest opacity-20 pb-1">Phonk</button>
            </div>
            <div class="text-[9px] font-bold tracking-widest opacity-40">BLUETOOTH : HZ_CAR_SYSTEM</div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center">
            <div id="art-box" class="relative w-full aspect-square max-w-[340px]">
                <div id="accent-glow" class="absolute inset-0 rounded-full blur-[80px] opacity-20 bg-[var(--accent)]"></div>
                <div class="w-full h-full glass rounded-[50px] overflow-hidden p-4">
                    <img id="main-cover" src="https://images.unsplash.com/photo-1542282088-fe8426682b8f?auto=format&fit=crop&q=80" class="w-full h-full object-cover rounded-[35px] grayscale brightness-50 contrast-125 transition-all duration-1000">
                </div>
                
                <div class="absolute bottom-12 left-10 right-10">
                    <div id="status-text" class="text-[10px] font-black uppercase tracking-[0.3em] mb-3 text-[var(--accent)]">Stream Active</div>
                    <div class="h-[2px] w-full bg-white/10 rounded-full overflow-hidden">
                        <div id="progress-bar" class="loading-bar"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mb-12">
            <div class="flex justify-center items-center gap-12">
                <button class="opacity-20 active:scale-90 transition"><i data-lucide="skip-back" class="w-10 h-10 fill-current"></i></button>
                <button id="play-pause" class="w-28 h-28 rounded-full bg-white text-black flex items-center justify-center active:scale-90 transition-all shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                    <i data-lucide="pause" id="play-icon" class="w-14 h-14 fill-current"></i>
                </button>
                <button class="opacity-20 active:scale-90 transition"><i data-lucide="skip-forward" class="w-10 h-10 fill-current"></i></button>
            </div>
        </footer>
    </div>

    <!-- AUDIO ENGINE -->
    <!-- Le lien pCloud est forcé via un paramètre de téléchargement direct si possible -->
    <audio id="audio-player" loop crossorigin="anonymous">
        <source src="https://e.pcloud.link/publink/show?code=XZh33iZR8zsaQ9mR4zbYDyEWPjJSYvmYq8V" type="audio/mpeg">
    </audio>

    <script>
        lucide.createIcons();

        const audio = document.getElementById('audio-player');
        const launchBtn = document.getElementById('launch-btn');
        const playBtn = document.getElementById('play-pause');
        const intro = document.getElementById('intro');
        const mainView = document.getElementById('main');
        const progressBar = document.getElementById('progress-bar');
        const cover = document.getElementById('main-cover');

        // Initialisation de l'audio avec le lien
        launchBtn.addEventListener('click', () => {
            // Tentative de lecture immédiate
            audio.play().catch(err => {
                console.log("Audio waiting for user...");
            });

            gsap.to(intro, {
                opacity: 0, scale: 0.8, duration: 1, ease: "expo.inOut",
                onComplete: () => {
                    intro.style.display = 'none';
                    mainView.classList.remove('hidden-view');
                    gsap.from(mainView, { opacity: 0, y: 50, duration: 1.2, ease: "expo.out" });
                }
            });
        });

        // Toggle Play/Pause
        playBtn.addEventListener('click', () => {
            const icon = document.getElementById('play-icon');
            if (audio.paused) {
                audio.play();
                icon.setAttribute('data-lucide', 'pause');
            } else {
                audio.pause();
                icon.setAttribute('data-lucide', 'play');
            }
            lucide.createIcons();
            
            // Effet visuel nerveux
            const artBox = document.getElementById('art-box');
            artBox.classList.add('glitch-effect');
            setTimeout(() => artBox.classList.remove('glitch-effect'), 150);
        });

        // Gestion des Modes
        const nBtn = document.getElementById('mode-night');
        const pBtn = document.getElementById('mode-phonk');

        function setTheme(mode) {
            const isPhonk = mode === 'phonk';
            const color = isPhonk ? '#ff0044' : '#00f2ff';
            const img = isPhonk ? 
                "https://images.unsplash.com/photo-1603584173870-7f3ca976230a?auto=format&fit=crop&q=80" : 
                "https://images.unsplash.com/photo-1542282088-fe8426682b8f?auto=format&fit=crop&q=80";

            document.documentElement.style.setProperty('--accent', color);
            nBtn.style.opacity = isPhonk ? "0.2" : "1";
            nBtn.style.borderBottomColor = isPhonk ? "transparent" : color;
            pBtn.style.opacity = isPhonk ? "1" : "0.2";
            pBtn.style.borderBottomColor = isPhonk ? color : "transparent";
            
            cover.src = img;
            document.getElementById('status-text').innerText = isPhonk ? "Phonk Drift Active" : "Night Stream Active";
            document.getElementById('status-text').style.color = color;
            document.getElementById('accent-glow').style.backgroundColor = color;
        }

        nBtn.addEventListener('click', () => setTheme('night'));
        pBtn.addEventListener('click', () => setTheme('phonk'));

        // Barre de progression
        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
        });

        // Warp Speed Canvas
        const canvas = document.getElementById('warp-canvas');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            lines = [];
            for(let i=0; i<80; i++) {
                lines.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 15 + 5,
                    length: Math.random() * 50 + 20
                });
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.lineWidth = 2;
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            
            lines.forEach(l => {
                ctx.strokeStyle = accentColor;
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x, l.y + l.length);
                ctx.stroke();
                
                l.y += l.speed;
                if(l.y > canvas.height) {
                    l.y = -l.length;
                    l.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // Bloquer Zoom et Scroll
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
