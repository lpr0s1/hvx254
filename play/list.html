```html
<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HZ - Night & Phonk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --night-accent: #00f2ff;
            --phonk-accent: #ff0055;
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .canvas-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .visual-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .visual-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.3) contrast(1.2) saturate(0.5);
        }

        .hz-watermark {
            position: fixed;
            bottom: -5vh;
            right: -2vw;
            font-size: 25vw;
            font-weight: 900;
            font-style: italic;
            opacity: 0.05;
            z-index: 0;
            line-height: 0.7;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mode-transition {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pulse-accent {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .active-tab {
            border-bottom: 2px solid white;
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <canvas id="particles" class="canvas-overlay"></canvas>
    <div class="hz-watermark">HZ</div>

    <div class="visual-bg" id="bg-container">
        <img id="bg-image" src="https://images.unsplash.com/photo-1542282088-fe8426682b8f?q=80&w=1000&auto=format&fit=crop" alt="Night Car">
    </div>

    <div id="intro" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">
        <div class="text-center space-y-6">
            <h2 class="text-[10px] tracking-[0.5em] uppercase opacity-40">CarPlay screen adapt</h2>
            <button id="btn-init" class="relative group">
                <div class="absolute -inset-6 bg-white/5 rounded-full blur-2xl transition group-hover:bg-white/10"></div>
                <div class="w-32 h-32 rounded-full border border-white/20 flex items-center justify-center glass-card relative">
                    <i data-lucide="play" class="w-12 h-12 fill-white"></i>
                </div>
                <p class="mt-8 text-xs tracking-widest uppercase font-light">Lancer la playlist</p>
            </button>
        </div>
    </div>

    <div id="player" class="fixed inset-0 z-40 flex flex-col p-6 opacity-0 translate-y-10 pointer-events-none">
        
        <header class="flex justify-between items-center mt-8">
            <div class="flex gap-6">
                <button id="nav-night" class="text-lg font-bold tracking-tighter uppercase opacity-40 active-tab transition-all">Night</button>
                <button id="nav-phonk" class="text-lg font-bold tracking-tighter uppercase opacity-40 transition-all">Phonk</button>
            </div>
            <div class="w-10 h-10 rounded-full glass-card flex items-center justify-center">
                <i data-lucide="bluetooth" class="w-4 h-4 text-blue-400"></i>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center">
            <div id="album-art" class="relative w-72 h-72 mb-12">
                <div class="absolute inset-0 bg-white/5 rounded-[40px] rotate-3 blur-sm"></div>
                <div class="relative w-full h-full rounded-[40px] overflow-hidden glass-card shadow-2xl">
                    <img id="cover-img" src="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=1000&auto=format&fit=crop" class="w-full h-full object-cover grayscale transition-all duration-1000">
                </div>
            </div>

            <div class="w-full px-4 mb-12">
                <div class="flex justify-between text-[10px] uppercase tracking-tighter opacity-40 mb-2">
                    <span id="current-time">0:00</span>
                    <span id="total-time">--:--</span>
                </div>
                <div class="h-[3px] w-full bg-white/10 rounded-full overflow-hidden">
                    <div id="progress" class="h-full bg-white w-0 transition-all duration-300"></div>
                </div>
            </div>
        </main>

        <footer class="mb-10">
            <div class="flex justify-around items-center">
                <button class="opacity-30"><i data-lucide="shuffle" class="w-5 h-5"></i></button>
                <button class="opacity-30"><i data-lucide="skip-back" class="w-8 h-8 fill-current"></i></button>
                <button id="play-toggle" class="w-24 h-24 rounded-full bg-white text-black flex items-center justify-center shadow-2xl pulse-accent">
                    <i data-lucide="pause" id="play-icon" class="w-10 h-10 fill-current"></i>
                </button>
                <button class="opacity-30"><i data-lucide="skip-forward" class="w-8 h-8 fill-current"></i></button>
                <button class="opacity-30"><i data-lucide="repeat" class="w-5 h-5"></i></button>
            </div>
        </footer>
    </div>

    <audio id="audio" src="playlist.mp3" loop prefetch="auto"></audio>

    <script>
        lucide.createIcons();

        const state = {
            mode: 'night', // 'night' ou 'phonk'
            isPlaying: false
        };

        const config = {
            night: {
                accent: '#00f2ff',
                img: 'https://images.unsplash.com/photo-1542282088-fe8426682b8f?q=80&w=1000&auto=format&fit=crop',
                cover: 'https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=1000&auto=format&fit=crop'
            },
            phonk: {
                accent: '#ff0055',
                img: 'https://images.unsplash.com/photo-1563720223185-11003d516935?q=80&w=1000&auto=format&fit=crop',
                cover: 'https://images.unsplash.com/photo-1603584173870-7f3ca976230a?q=80&w=1000&auto=format&fit=crop'
            }
        };

        const audio = document.getElementById('audio');
        const progress = document.getElementById('progress');
        const playToggle = document.getElementById('play-toggle');
        const bgImg = document.getElementById('bg-image');
        const coverImg = document.getElementById('cover-img');

        document.getElementById('btn-init').addEventListener('click', () => {
            audio.play();
            state.isPlaying = true;
            
            gsap.to('#intro', { opacity: 0, scale: 1.1, duration: 1, ease: "power4.inOut", onComplete: () => {
                document.getElementById('intro').style.display = 'none';
                const player = document.getElementById('player');
                player.classList.remove('pointer-events-none');
                gsap.to(player, { opacity: 1, y: 0, duration: 1.5, ease: "expo.out" });
            }});
        });

        const switchMode = (mode) => {
            if (state.mode === mode) return;
            state.mode = mode;

            const isPhonk = mode === 'phonk';
            document.getElementById('nav-night').classList.toggle('active-tab', !isPhonk);
            document.getElementById('nav-phonk').classList.toggle('active-tab', isPhonk);

            gsap.to('#bg-container', { scale: 1.2, opacity: 0.5, duration: 0.4, onComplete: () => {
                bgImg.src = config[mode].img;
                coverImg.src = config[mode].cover;
                gsap.to('#bg-container', { scale: 1, opacity: 1, duration: 1 });
            }});

            gsap.to(playToggle, { backgroundColor: config[mode].accent, duration: 0.6 });
        };

        document.getElementById('nav-night').addEventListener('click', () => switchMode('night'));
        document.getElementById('nav-phonk').addEventListener('click', () => switchMode('phonk'));

        playToggle.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                state.isPlaying = true;
                document.getElementById('play-icon').setAttribute('data-lucide', 'pause');
            } else {
                audio.pause();
                state.isPlaying = false;
                document.getElementById('play-icon').setAttribute('data-lucide', 'play');
            }
            lucide.createIcons();
        });

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progress.style.width = `${pct}%`;
            
            const m = Math.floor(audio.currentTime / 60);
            const s = Math.floor(audio.currentTime % 60);
            document.getElementById('current-time').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        });

        audio.addEventListener('loadedmetadata', () => {
            const m = Math.floor(audio.duration / 60);
            const s = Math.floor(audio.duration % 60);
            document.getElementById('total-time').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        });

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = Math.random() * 2 + 1;
                this.size = Math.random() * 2;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.init();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
