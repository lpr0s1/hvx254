
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HZ Night Playlist</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
body {
  -webkit-touch-callout: none;
  -webkit-text-size-adjust: 100%;
  -webkit-user-select: none;
  user-select: none;
  background: #000;
}
.bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
  z-index: -1;
}
.no-zoom {
  touch-action: manipulation;
}
.glass {
  background: radial-gradient(circle at top, rgba(168,85,247,0.18), transparent 55%), rgba(0,0,0,0.72);
  backdrop-filter: blur(26px);
}
.pulse-ring {
  position: relative;
}
.pulse-ring::before {
  content: "";
  position: absolute;
  inset: -8px;
  border-radius: 9999px;
  border: 2px solid rgba(168,85,247,0.6);
  opacity: 0;
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0% { transform: scale(0.9); opacity: 0.8; }
  100% { transform: scale(1.2); opacity: 0; }
}
</style>
</head>
<body class="no-zoom text-gray-100 overflow-hidden">

<video class="bg-video" autoplay muted loop playsinline>
  <source src="car-loop.mp4" type="video/mp4">
</video>

<div class="relative min-h-screen flex flex-col items-center justify-between px-4 py-6 bg-black/70 backdrop-blur-3xl">

  <div class="w-full flex items-center justify-between mt-1 opacity-90">
    <div class="text-[0.65rem] tracking-[0.35em] uppercase text-gray-300">CarPlay screen adapt</div>
    <div class="flex items-center space-x-3 text-gray-300 text-xl">
      <i class="ri-bluetooth-fill animate-pulse text-blue-400"></i>
      <i class="ri-moon-clear-fill text-purple-300"></i>
    </div>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center space-y-10 w-full">

    <div class="flex flex-col items-center space-y-3">
      <div id="hzTitle" class="text-7xl md:text-8xl font-extrabold tracking-tight bg-gradient-to-r from-purple-500 via-fuchsia-500 to-cyan-400 bg-clip-text text-transparent select-none">
        HZ
      </div>
      <div class="text-xs uppercase tracking-[0.4em] text-purple-300">Phonk</div>
    </div>

    <div class="w-full max-w-md rounded-3xl glass border border-white/10 shadow-[0_0_60px_rgba(88,28,135,0.7)] p-6 space-y-8">

      <div class="flex items-center justify-between">
        <div class="flex flex-col">
          <span class="text-[0.65rem] uppercase tracking-[0.35em] text-purple-400">Phonk</span>
          <span class="mt-3 text-xl font-semibold text-gray-100">lancer la playlist</span>
        </div>
        <div class="flex items-center space-x-2 text-xs text-gray-300">
          <i class="ri-car-fill text-purple-400 text-xl"></i>
          <span>Night</span>
        </div>
      </div>

      <div class="flex items-center justify-between space-x-5">
        <button id="launchBtn" class="flex-1 inline-flex items-center justify-center space-x-3 rounded-2xl bg-gradient-to-r from-purple-700 via-fuchsia-600 to-cyan-500 hover:from-purple-600 hover:via-fuchsia-500 hover:to-cyan-400 active:scale-95 transition-all duration-150 py-3.5 text-sm font-semibold tracking-wide shadow-lg shadow-purple-900/70">
          <span>lancer la playlist</span>
          <i class="ri-flashlight-fill text-lg"></i>
        </button>
        <button id="playBtn" class="pulse-ring w-20 h-20 rounded-full bg-white text-slate-900 flex items-center justify-center text-4xl shadow-2xl shadow-purple-900/80 transform transition-all duration-150 hover:scale-110 active:scale-95">
          <i class="ri-play-fill" id="playIcon"></i>
        </button>
      </div>

      <div class="w-full h-2 rounded-full bg-slate-900 overflow-hidden">
        <div id="progressBar" class="h-full w-0 bg-gradient-to-r from-purple-500 via-fuchsia-500 to-cyan-400"></div>
      </div>

    </div>
  </div>

  <div class="w-full flex items-center justify-between text-[0.7rem] text-gray-400 opacity-90">
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
      <span>Bluetooth</span>
    </div>
    <div class="flex items-center space-x-3">
      <i class="ri-android-fill text-green-400"></i>
      <i class="ri-apple-fill text-gray-200"></i>
    </div>
  </div>

</div>

<audio id="audioPlayer" src="AUDIO_DIRECT_URL_HERE"></audio>

<script>
let lastTouchEnd = 0;
document.addEventListener('touchstart', function (e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener('touchend', function (e) { const now = Date.now(); if (now - lastTouchEnd <= 300) e.preventDefault(); lastTouchEnd = now; }, { passive: false });
document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

const audio = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const launchBtn = document.getElementById('launchBtn');
const progressBar = document.getElementById('progressBar');

function togglePlay() {
  if (audio.paused) {
    audio.play();
    playIcon.classList.remove('ri-play-fill');
    playIcon.classList.add('ri-pause-fill');
    gsap.to(playBtn, { scale: 1.12, duration: 0.15, yoyo: true, repeat: 1, ease: 'power2.out' });
  } else {
    audio.pause();
    playIcon.classList.remove('ri-pause-fill');
    playIcon.classList.add('ri-play-fill');
  }
}

playBtn.addEventListener('click', togglePlay);
launchBtn.addEventListener('click', function () {
  togglePlay();
  gsap.fromTo('#progressBar', { width: '0%' }, { width: '100%', duration: 1.8, ease: 'power2.out' });
});

audio.addEventListener('timeupdate', function () {
  if (audio.duration) {
    progressBar.style.width = (audio.currentTime / audio.duration) * 100 + '%';
  }
});

audio.addEventListener('ended', function () {
  playIcon.classList.remove('ri-pause-fill');
  playIcon.classList.add('ri-play-fill');
  gsap.to('#progressBar', { width: '0%', duration: 0.4, ease: 'power2.out' });
});

gsap.from('#hzTitle', { opacity: 0, y: 60, duration: 1.1, ease: 'power3.out' });
gsap.from('.glass', { opacity: 0, y: 40, duration: 0.9, delay: 0.2, ease: 'power3.out' });
</script>

</body>
</html>
