<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Type R Speedometer - Alcantara Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --honda-red: #e60000;
            --alcantara-bg: #1a1a1b;
            --alcantara-texture: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Texture Alcantara */
        .alcantara {
            background-color: var(--alcantara-bg);
            background-image: 
                radial-gradient(circle at 50% 50%, var(--alcantara-texture) 1%, transparent 1%),
                radial-gradient(circle at 20% 80%, var(--alcantara-texture) 1%, transparent 1%);
            background-size: 4px 4px;
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        /* Effet de couture rouge Type R */
        .stitching {
            border: 2px dashed rgba(230, 0, 0, 0.3);
            border-radius: 1.5rem;
        }

        .speed-text {
            text-shadow: 0 0 30px rgba(230, 0, 0, 0.5);
            font-weight: 900;
            font-style: italic;
            font-variant-numeric: tabular-nums; /* Empêche les chiffres de bouger horizontalement */
        }

        .led {
            width: 22px;
            height: 8px;
            border-radius: 2px;
            background: #222;
            transition: all 0.05s ease-out;
            transform: skewX(-15deg);
        }

        .led.active-green { background: #00ff44; box-shadow: 0 0 15px #00ff44; }
        .led.active-orange { background: #ffaa00; box-shadow: 0 0 15px #ffaa00; }
        .led.active-red { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .led.active-blink { 
            background: #ff0000; 
            box-shadow: 0 0 25px #ff0000;
            animation: blink 0.1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .unit {
            color: var(--honda-red);
            letter-spacing: 4px;
            font-size: 0.75rem;
            opacity: 0.8;
        }

        /* Suppression du zoom iOS */
        html, body {
            position: fixed;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen w-screen p-6">

    <!-- Shift Lights Style Course -->
    <div class="flex space-x-1.5 mb-10" id="shift-lights">
        <!-- Sequence: Green (2), Orange (4), Red (4) -->
        <div class="led" data-threshold="15"></div>
        <div class="led" data-threshold="30"></div>
        <div class="led" data-threshold="45"></div>
        <div class="led" data-threshold="60"></div>
        <div class="led" data-threshold="75"></div>
        <div class="led" data-threshold="90"></div>
        <div class="led" data-threshold="110"></div>
        <div class="led" data-threshold="130"></div>
        <div class="led" data-threshold="150"></div>
        <div class="led" data-threshold="180"></div>
    </div>

    <!-- Boîtier Principal Alcantara -->
    <div class="alcantara w-full max-w-md aspect-[4/3] rounded-[2rem] flex items-center justify-center p-1 shadow-[0_0_50px_rgba(0,0,0,1)]">
        <div class="stitching w-full h-full flex flex-col items-center justify-center relative">
            
            <!-- Décoration Carbone/Ligne rouge -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-red-600 rounded-b-full"></div>

            <div class="z-10 flex flex-col items-center">
                <div class="flex items-baseline">
                    <span id="speed" class="speed-text text-9xl md:text-[10rem]">0</span>
                </div>
                <span class="unit font-black uppercase">km/h</span>
            </div>

            <!-- Infos GPS discrètes -->
            <div class="absolute bottom-6 flex space-x-6 text-[10px] font-sans text-gray-500 uppercase tracking-widest">
                <div class="flex flex-col items-center">
                    <span class="text-gray-600">Precision</span>
                    <span id="accuracy">--</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-gray-600">Altitude</span>
                    <span id="altitude">--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Permission Overlay -->
    <div id="permission-overlay" class="fixed inset-0 bg-[#050505] z-50 flex flex-col items-center justify-center text-center p-8">
        <div class="w-24 h-24 mb-8 relative">
            <div class="absolute inset-0 border-4 border-red-600 rounded-full animate-ping opacity-25"></div>
            <div class="absolute inset-0 border-2 border-red-600 rounded-full flex items-center justify-center">
                <svg class="w-10 h-10 text-red-600" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path>
                </svg>
            </div>
        </div>
        <h1 class="text-2xl font-black italic mb-2 tracking-tighter">TYPE R TELEMETRY</h1>
        <p class="text-gray-500 text-sm mb-10 font-sans tracking-wide">ACTIVATION DU CAPTEUR GPS HAUTE PRÉCISION</p>
        <button id="start-btn" class="bg-red-600 hover:bg-red-500 text-white font-black py-5 px-12 rounded-xl transition-all active:scale-90 uppercase italic tracking-widest shadow-[0_10px_30px_rgba(230,0,0,0.3)]">
            Start Engine
        </button>
    </div>

    <div id="status" class="mt-8 text-[10px] text-gray-700 uppercase tracking-[0.3em]">System Ready</div>

    <script>
        const speedEl = document.getElementById('speed');
        const accuracyEl = document.getElementById('accuracy');
        const altitudeEl = document.getElementById('altitude');
        const statusEl = document.getElementById('status');
        const overlay = document.getElementById('permission-overlay');
        const startBtn = document.getElementById('start-btn');
        const leds = document.querySelectorAll('.led');

        let targetSpeed = 0;
        let currentDisplaySpeed = 0;
        let lastTimestamp = 0;

        // --- MOTEUR DE RENDU TEMPS RÉEL (60 FPS) ---
        // Utilise l'interpolation linéaire pour lisser les sauts du GPS
        function updateDisplay(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = timestamp - lastTimestamp;

            // Vitesse d'ajustement du compteur (plus le facteur est élevé, plus c'est réactif)
            const lerpFactor = 0.1; 
            currentDisplaySpeed += (targetSpeed - currentDisplaySpeed) * lerpFactor;

            // Mise à jour du texte (on affiche l'entier pour la lisibilité)
            const roundedSpeed = Math.round(currentDisplaySpeed);
            speedEl.innerText = roundedSpeed;

            // Mise à jour des LEDs basée sur la vitesse lissée
            updateShiftLights(currentDisplaySpeed);

            lastTimestamp = timestamp;
            requestAnimationFrame(updateDisplay);
        }

        function updateShiftLights(speed) {
            leds.forEach((led, index) => {
                const threshold = parseInt(led.dataset.threshold);
                led.classList.remove('active-green', 'active-orange', 'active-red', 'active-blink');

                if (speed >= threshold) {
                    if (index < 2) led.classList.add('active-green');
                    else if (index < 6) led.classList.add('active-orange');
                    else if (index < 9) led.classList.add('active-red');
                    else led.classList.add('active-blink');
                }
            });
        }

        function handleSuccess(position) {
            const { speed, accuracy, altitude } = position.coords;
            
            // On définit la cible, le moteur de rendu fera le lissage
            targetSpeed = speed ? speed * 3.6 : 0;
            
            accuracyEl.innerText = Math.round(accuracy) + "m";
            altitudeEl.innerText = altitude ? Math.round(altitude) + "m" : "--";
            
            statusEl.innerText = "GPS Tracking Active";
            statusEl.style.color = "#444";
        }

        function handleError(error) {
            statusEl.innerText = "GPS Error: " + error.message;
            statusEl.style.color = "#e60000";
        }

        function startTracking() {
            overlay.style.display = 'none';
            
            if ("geolocation" in navigator) {
                // Démarrer la boucle de rendu
                requestAnimationFrame(updateDisplay);

                navigator.geolocation.watchPosition(handleSuccess, handleError, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: Infinity
                });
            } else {
                statusEl.innerText = "GPS non supporté";
            }
        }

        // Sécurité contre le zoom iOS
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        startBtn.addEventListener('click', startTracking);

    </script>
</body>
</html>
