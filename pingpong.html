<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Breaker V24.0 - Velocity & Combos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --gold: #d4af37;
            --gold-bright: #fcf6ba;
            --royal-bg: #020202;
            --fire: #ff6a00;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--royal-bg);
            color: white;
            margin-top: -30px;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .royal-text {
            background: linear-gradient(to right, #bf953f 20%, #fcf6ba 40%, #b38728 60%, #fcf6ba 80%, #bf953f 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .xp-bar-fill {
            background: linear-gradient(90deg, var(--gold), var(--gold-bright));
            box-shadow: 0 0 15px var(--gold);
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #game-canvas {
            touch-action: none;
            cursor: none;
            z-index: 10;
            margin-top: -100px;
        }

        #bg-fire-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }

        .grade-fire-glow {
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(255,106,0,0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(10px);
            animation: pulse-fire 2s infinite alternate;
        }

        @keyframes pulse-fire {
            from { transform: scale(0.8); opacity: 0.2; }
            to { transform: scale(1.2); opacity: 0.5; }
        }

        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .roadmap-scroll::-webkit-scrollbar { display: none; }
        
        #combo-ui {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            font-size: 4rem;
            font-weight: 900;
            opacity: 0;
            z-index: 100;
        }
    </style>
</head>
<body class="h-screen w-screen p-4 flex flex-col items-center">

    <canvas id="bg-fire-canvas"></canvas>

    <!-- HUD -->
    <div id="hud" class="w-full max-w-md mb-4 space-y-3 opacity-0 z-20">
        <div id="grade-trigger" class="flex justify-between items-center glass-panel p-4 rounded-[2rem] cursor-pointer active:scale-95 transition-transform">
            <div class="flex items-center gap-4">
                <div class="relative w-12 h-12 rounded-full bg-yellow-500/10 flex items-center justify-center border border-yellow-500/20">
                    <div class="grade-fire-glow"></div>
                    <i id="rank-icon" data-lucide="shield" class="w-6 h-6 text-yellow-500 relative z-10"></i>
                </div>
                <div>
                    <div id="rank-name" class="text-[11px] text-yellow-500 font-black uppercase tracking-[0.2em]">Apprenti</div>
                    <div class="w-28 h-2 bg-black/40 rounded-full mt-1.5 overflow-hidden border border-white/5">
                        <div id="xp-fill" class="xp-bar-fill h-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <div id="score-val" class="text-2xl font-black royal-text">0000</div>
                <div id="stage-val" class="text-[8px] text-white/40 uppercase tracking-[0.3em] font-bold">Étape 1</div>
            </div>
        </div>
        
        <div class="flex justify-between items-center px-4">
            <div id="lives-container" class="flex gap-2.5"></div>
            <button id="btn-pause" class="glass-panel px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.2em] text-yellow-500 hover:bg-white/5 transition-colors">Pause</button>
        </div>
    </div>

    <!-- ZONE DE JEU -->
    <div id="game-container" class="relative w-full max-w-md flex-1 glass-panel rounded-[3.5rem] overflow-hidden opacity-0 border-yellow-500/10 z-10">
        <canvas id="game-canvas" class="w-full h-full block"></canvas>
        
        <!-- COMBO POPUP -->
        <div id="combo-ui" class="royal-text">x2</div>

        <!-- COMPTE À REBOURS -->
        <div id="countdown-overlay" class="absolute inset-0 z-[200] hidden flex items-center justify-center bg-black/20 backdrop-blur-sm">
            <div id="countdown-num" class="text-[120px] font-black royal-text">3</div>
        </div>

        <!-- MENU ROADMAP DES GRADES -->
        <div id="roadmap-overlay" class="absolute inset-0 z-[250] hidden flex flex-col items-center justify-center bg-black/90 backdrop-blur-2xl p-6">
            <div id="roadmap-card" class="glass-panel w-full max-w-sm rounded-[3rem] p-8 flex flex-col items-center overflow-hidden relative">
                <button id="btn-close-roadmap" class="absolute top-6 right-6 text-white/40 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                
                <h3 class="text-xs font-black text-yellow-500 uppercase tracking-[0.4em] mb-8">Parcours de Gloire</h3>
                
                <div class="flex flex-col items-center mb-10">
                    <div id="roadmap-icon-container" class="w-24 h-24 rounded-full bg-yellow-500/10 flex items-center justify-center border-2 border-yellow-500/30 mb-4 shadow-[0_0_30px_rgba(212,175,55,0.2)]">
                        <i id="roadmap-current-icon" data-lucide="shield" class="w-12 h-12 text-yellow-500"></i>
                    </div>
                    <div id="roadmap-current-name" class="text-xl font-black royal-text uppercase tracking-widest">Apprenti</div>
                    <div class="text-[10px] text-white/40 mt-2 uppercase">Prochain rang débloqué à 100%</div>
                </div>

                <div class="w-full roadmap-scroll overflow-x-auto flex gap-6 pb-6 px-4 mask-edges">
                    <div id="roadmap-list" class="flex gap-8 items-start"></div>
                </div>

                <div class="w-full bg-white/5 h-2 rounded-full mt-6 overflow-hidden">
                    <div id="roadmap-xp-fill" class="xp-bar-fill h-full"></div>
                </div>
            </div>
        </div>

        <!-- MENU OVERLAY -->
        <div id="menu-overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#020202]/95 backdrop-blur-xl p-8 text-center">
            <div id="logo-container" class="mb-8"><i data-lucide="crown" class="w-20 h-20 text-yellow-500 mx-auto drop-shadow-[0_0_20px_rgba(212,175,55,0.5)]"></i></div>
            <h1 class="text-5xl font-black royal-text mb-2 tracking-tighter">LEGACY</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.6em] uppercase mb-12 font-bold">Version 24.0 - Velocity</p>
            <button id="btn-start" class="w-full max-w-[260px] py-5 bg-gradient-to-r from-yellow-700 via-yellow-400 to-yellow-700 text-black font-black rounded-[2rem] text-lg uppercase tracking-widest active:scale-95 shadow-[0_20px_40px_rgba(212,175,55,0.2)]">Entrer dans l'Arène</button>
        </div>

        <!-- PAUSE OVERLAY -->
        <div id="pause-overlay" class="absolute inset-0 z-[100] hidden flex flex-col items-center justify-center bg-black/80 backdrop-blur-lg p-8">
            <div class="glass-panel p-10 rounded-[3rem] text-center w-full max-w-xs pop-in border-yellow-500/30">
                <i data-lucide="pause-circle" class="w-12 h-12 text-yellow-500 mx-auto mb-6"></i>
                <h2 class="text-3xl font-black royal-text mb-8 uppercase tracking-widest">Pause</h2>
                <button id="btn-resume" class="w-full py-5 bg-white text-black font-black rounded-2xl uppercase tracking-widest active:scale-95 hover:bg-yellow-500 transition-colors">Reprendre</button>
            </div>
        </div>

        <!-- GAMEOVER OVERLAY -->
        <div id="gameover-overlay" class="absolute inset-0 z-[110] hidden flex flex-col items-center justify-center bg-black/95 p-8 text-center">
            <div class="glass-panel p-10 rounded-[3.5rem] border-red-500/30 w-full max-w-xs pop-in">
                <i data-lucide="skull" class="w-16 h-16 text-red-600 mx-auto mb-6"></i>
                <h2 class="text-4xl font-black text-red-600 mb-2 uppercase tracking-tighter">Défaite</h2>
                <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] mb-10">Score : <span id="final-score" class="text-white">0</span></p>
                <button id="btn-restart" class="w-full py-5 bg-red-600 text-white font-black rounded-2xl uppercase tracking-widest active:scale-95">Renaître</button>
            </div>
        </div>
    </div>

    <script>
        // --- AUDIO ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSound(freq, type = 'sine', duration = 0.1, vol = 0.08) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // --- GRADES CONFIG ---
        const GRADES = [
            { name: "Apprenti", xp: 500, icon: "shield" },
            { name: "Chevalier", xp: 1500, icon: "swords" },
            { name: "Maître", xp: 4000, icon: "zap" },
            { name: "Légende", xp: 9000, icon: "sun" },
            { name: "Souverain", xp: 20000, icon: "crown" }
        ];

        // --- CONSTANTES DE JEU ---
        const BASE_BALL_SPEED = 6;
        const SPEED_INCREMENT = 0.08;
        const MAX_BALL_SPEED = 14;

        // --- ENGINE ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const fireCanvas = document.getElementById('bg-fire-canvas');
        const fctx = fireCanvas.getContext('2d');

        let state = {
            status: 'MENU', score: 0, xp: 0, lives: 3, gradeIdx: 0, stage: 1,
            paddle: { x: 0, w: 90, h: 12 }, 
            ball: { x: 0, y: 0, dx: 0, dy: 0, r: 7, speed: BASE_BALL_SPEED, trail: [] },
            bricks: [], particles: [], fireParticles: [], shakes: 0,
            combo: 0, lastComboTime: 0
        };

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.height;
            fireCanvas.width = window.innerWidth; fireCanvas.height = window.innerHeight;
            state.paddle.x = (canvas.width - state.paddle.w) / 2;
        }

        // --- FIRE SYSTEM ---
        function createFireParticle() {
            return {
                x: Math.random() * fireCanvas.width,
                y: fireCanvas.height + Math.random() * 50,
                vx: (Math.random() - 0.5) * 1.2,
                vy: -Math.random() * 2 - 1,
                life: 1,
                size: Math.random() * 30 + 15,
                color: `hsla(${Math.random() * 25 + 10}, 100%, 50%, 0.4)`
            };
        }

        function drawFire() {
            fctx.clearRect(0, 0, fireCanvas.width, fireCanvas.height);
            if(state.fireParticles.length < 80) state.fireParticles.push(createFireParticle());
            
            fctx.globalCompositeOperation = 'screen';
            state.fireParticles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.004;
                if(p.life <= 0) state.fireParticles[i] = createFireParticle();
                
                let grd = fctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                grd.addColorStop(0, p.color);
                grd.addColorStop(1, 'transparent');
                fctx.fillStyle = grd;
                fctx.globalAlpha = p.life;
                fctx.beginPath(); fctx.arc(p.x, p.y, p.size, 0, Math.PI*2); fctx.fill();
            });
            fctx.globalAlpha = 1;
            requestAnimationFrame(drawFire);
        }

        // --- GAMEPLAY ---
        function generateLevel(stage) {
            state.bricks = [];
            const rows = Math.min(4 + Math.floor(stage / 2), 7);
            const cols = 8; const gap = 6;
            const w = (canvas.width - 30 - (cols - 1) * gap) / cols;
            const pattern = stage % 5;
            for(let r = 0; r < rows; r++) {
                for(let c = 0; c < cols; c++) {
                    let active = true;
                    if (pattern === 1 && (r + c) % 2 === 0) active = false;
                    if (pattern === 2 && (c < 2 || c > 5)) active = (r % 2 !== 0);
                    if (pattern === 3 && r > 1 && c > 1 && c < 6) active = (r === 2 || r === rows-1);
                    if (pattern === 4) active = (c % 3 !== 0);

                    if (active) {
                        state.bricks.push({
                            x: 15 + c * (w + gap), y: 70 + r * (20 + gap),
                            w: w, h: 20, active: true,
                            color: `hsl(${25 + (r * 15) + (stage * 10)}, 85%, 50%)`
                        });
                    }
                }
            }
        }

        function resetBall() {
            state.ball.x = canvas.width / 2;
            state.ball.y = canvas.height - 120;
            state.ball.speed = BASE_BALL_SPEED + (state.stage * 0.2);
            const angle = (Math.random() - 0.5) * 1.2;
            state.ball.dx = Math.sin(angle) * state.ball.speed;
            state.ball.dy = -Math.cos(angle) * state.ball.speed;
            state.ball.trail = [];
            state.combo = 0;
        }

        function showCombo() {
            if (state.combo < 2) return;
            const ui = document.getElementById('combo-ui');
            ui.innerText = `x${state.combo}`;
            gsap.fromTo(ui, { opacity: 1, scale: 0.5, y: 0 }, { opacity: 0, scale: 2, y: -100, duration: 0.8, ease: "power2.out" });
        }

        function spawnParticles(x, y, color) {
            for(let i = 0; i < 12; i++) {
                state.particles.push({
                    x, y, dx: (Math.random() - 0.5) * 8, dy: (Math.random() - 0.5) * 8,
                    life: 1.0, size: Math.random() * 4 + 1, color: color, gravity: 0.25
                });
            }
        }

        function countdown(callback) {
            const overlay = document.getElementById('countdown-overlay');
            const numEl = document.getElementById('countdown-num');
            overlay.classList.remove('hidden');
            let count = 3; numEl.innerText = count;
            playSound(300, 'square', 0.1);
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    numEl.innerText = count;
                    gsap.fromTo(numEl, { scale: 3, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: "back.out" });
                    playSound(300, 'square', 0.1);
                } else {
                    clearInterval(timer); overlay.classList.add('hidden');
                    playSound(600, 'square', 0.2); callback();
                }
            }, 800);
        }

        function update() {
            if(state.status !== 'PLAYING') return;

            // Particules
            state.particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.dy += p.gravity; p.life -= 0.03;
                if(p.life <= 0) state.particles.splice(i, 1);
            });

            // Balle Trail
            state.ball.trail.push({x: state.ball.x, y: state.ball.y});
            if(state.ball.trail.length > 8) state.ball.trail.shift();

            // Balle Mouvement
            let b = state.ball;
            b.x += b.dx; b.y += b.dy;

            // Murs
            if(b.x < b.r || b.x > canvas.width - b.r) { 
                b.dx *= -1; 
                b.x = b.x < b.r ? b.r : canvas.width - b.r; 
                playSound(220); 
                state.shakes = 3;
            }
            if(b.y < b.r) { 
                b.dy *= -1; b.y = b.r; 
                playSound(280); 
                state.shakes = 3;
            }

            // Paddle
            if(b.y > canvas.height - 45 - b.r && b.y < canvas.height - 30) {
                if(b.x > state.paddle.x && b.x < state.paddle.x + state.paddle.w) {
                    b.dy = -Math.abs(b.dy);
                    let hitPos = (b.x - (state.paddle.x + state.paddle.w/2)) / (state.paddle.w/2);
                    
                    // Acceleration
                    b.speed = Math.min(MAX_BALL_SPEED, b.speed + SPEED_INCREMENT);
                    b.dx = hitPos * b.speed;
                    b.dy = -Math.sqrt(b.speed*b.speed - b.dx*b.dx);
                    
                    playSound(400, 'triangle');
                    state.shakes = 8;
                    state.combo = 0; // Reset combo on paddle hit
                    spawnParticles(b.x, b.y, '#d4af37');
                    
                    // Animation paddle
                    gsap.to(state.paddle, { h: 8, duration: 0.1, yoyo: true, repeat: 1 });
                }
            }

            // Briques
            let activeCount = 0;
            state.bricks.forEach(br => {
                if(br.active) {
                    activeCount++;
                    if(b.x + b.r > br.x && b.x - b.r < br.x + br.w && b.y + b.r > br.y && b.y - b.r < br.y + br.h) {
                        br.active = false;
                        
                        // Collision direction
                        const overlapX = Math.min(b.x + b.r - br.x, br.x + br.w - (b.x - b.r));
                        const overlapY = Math.min(b.y + b.r - br.y, br.y + br.h - (b.y - b.r));
                        if (overlapX < overlapY) b.dx *= -1; else b.dy *= -1;

                        // Combo & Score
                        state.combo++;
                        const points = 50 * state.combo;
                        state.score += points;
                        state.xp += 15 + (state.combo * 2);
                        
                        if(state.combo > 1) showCombo();
                        
                        b.speed = Math.min(MAX_BALL_SPEED, b.speed + SPEED_INCREMENT * 0.5);
                        playSound(450 + (state.combo * 50));
                        spawnParticles(br.x + br.w/2, br.y + br.h/2, br.color);
                        checkProgress();
                    }
                }
            });

            // Victoire Étape
            if(activeCount === 0) {
                state.status = 'PAUSE';
                state.stage++;
                playSound(1000, 'sine', 0.5, 0.1);
                
                // Animation de transition
                gsap.to(canvas, { filter: 'blur(10px)', duration: 0.5, onComplete: () => {
                    generateLevel(state.stage);
                    resetBall();
                    document.getElementById('stage-val').innerText = `Étape ${state.stage}`;
                    gsap.to(canvas, { filter: 'blur(0px)', duration: 0.5 });
                    countdown(() => state.status = 'PLAYING');
                }});
            }

            // Mort
            if(b.y > canvas.height) {
                state.lives--; playSound(100, 'sawtooth', 0.4);
                updateLivesUI();
                state.combo = 0;
                if(state.lives <= 0) {
                    state.status = 'GAMEOVER';
                    document.getElementById('final-score').innerText = state.score;
                    document.getElementById('gameover-overlay').classList.remove('hidden');
                } else {
                    state.status = 'PAUSE';
                    resetBall();
                    setTimeout(() => countdown(() => state.status = 'PLAYING'), 500);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            if(state.shakes > 0) { ctx.translate((Math.random()-0.5)*state.shakes, (Math.random()-0.5)*state.shakes); state.shakes *= 0.85; }

            // Briques
            state.bricks.forEach(br => {
                if(!br.active) return;
                ctx.fillStyle = br.color;
                ctx.shadowBlur = 12; ctx.shadowColor = br.color;
                ctx.beginPath(); ctx.roundRect(br.x, br.y, br.w, br.h, 4); ctx.fill();
            });
            ctx.shadowBlur = 0;

            // Trail
            state.ball.trail.forEach((t, i) => {
                ctx.globalAlpha = (i / state.ball.trail.length) * 0.4;
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(t.x, t.y, state.ball.r * (i / state.ball.trail.length), 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Paddle
            ctx.fillStyle = 'white';
            ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(212,175,55,0.5)';
            ctx.beginPath(); ctx.roundRect(state.paddle.x, canvas.height - 40, state.paddle.w, state.paddle.h, 6); ctx.fill();

            // Ball
            ctx.fillStyle = 'white';
            ctx.shadowBlur = 15; ctx.shadowColor = 'white';
            ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI*2); ctx.fill();

            // Particules
            state.particles.forEach(p => {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.restore();
            update();
            requestAnimationFrame(draw);
        }

        function checkProgress() {
            const currentGrade = GRADES[state.gradeIdx];
            if(state.xp >= currentGrade.xp && state.gradeIdx < GRADES.length - 1) {
                state.gradeIdx++;
                state.xp = 0;
                playSound(900, 'sine', 0.6, 0.2);
                updateRankUI();
                gsap.fromTo("#rank-icon", { scale: 4, rotate: 720, filter: 'brightness(3)' }, { scale: 1, rotate: 0, filter: 'brightness(1)', duration: 1, ease: "elastic.out(1, 0.3)" });
            }
            document.getElementById('score-val').innerText = state.score.toString().padStart(4, '0');
            document.getElementById('xp-fill').style.width = Math.min(100, (state.xp / GRADES[state.gradeIdx].xp * 100)) + '%';
        }

        function updateRankUI() {
            document.getElementById('rank-name').innerText = GRADES[state.gradeIdx].name;
            document.getElementById('rank-icon').setAttribute('data-lucide', GRADES[state.gradeIdx].icon);
            lucide.createIcons();
        }

        function updateLivesUI() {
            const container = document.getElementById('lives-container');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                const icon = document.createElement('i');
                icon.setAttribute('data-lucide', 'shield');
                icon.className = `w-5 h-5 transition-all duration-500 ${i < state.lives ? 'text-red-500 fill-red-500/20 scale-100' : 'text-white/5 scale-75 opacity-20'}`;
                container.appendChild(icon);
            }
            lucide.createIcons();
        }

        function openRoadmap() {
            const list = document.getElementById('roadmap-list');
            list.innerHTML = '';
            GRADES.forEach((g, i) => {
                const isPassed = i < state.gradeIdx;
                const isCurrent = i === state.gradeIdx;
                
                const card = document.createElement('div');
                card.className = `roadmap-item flex flex-col items-center min-w-[110px] transition-all duration-500`;
                card.innerHTML = `
                    <div class="relative w-16 h-16 rounded-full flex items-center justify-center border-2 ${isPassed ? 'border-green-500 bg-green-500/10' : (isCurrent ? 'border-yellow-500 bg-yellow-500/10 shadow-[0_0_20px_rgba(212,175,55,0.3)]' : 'border-white/10 bg-white/5')}">
                        <i data-lucide="${g.icon}" class="w-8 h-8 ${isPassed ? 'text-green-500' : (isCurrent ? 'text-yellow-500' : 'text-white/40')}"></i>
                        ${isPassed ? '<div class="absolute -top-1 -right-1 bg-green-500 rounded-full p-1"><i data-lucide="check" class="w-3 h-3 text-black"></i></div>' : ''}
                    </div>
                    <span class="text-[9px] mt-4 font-black uppercase tracking-widest ${isCurrent ? 'text-yellow-500' : 'text-white/40'}">${g.name}</span>
                `;
                list.appendChild(card);
            });

            document.getElementById('roadmap-current-name').innerText = GRADES[state.gradeIdx].name;
            document.getElementById('roadmap-current-icon').setAttribute('data-lucide', GRADES[state.gradeIdx].icon);
            document.getElementById('roadmap-xp-fill').style.width = (state.xp / GRADES[state.gradeIdx].xp * 100) + '%';
            
            lucide.createIcons();
            document.getElementById('roadmap-overlay').classList.remove('hidden');
            
            // GSAP Stagger Animation
            gsap.from(".roadmap-item", { y: 50, opacity: 0, stagger: 0.1, duration: 0.5, ease: "back.out(1.7)" });
        }

        function startGame() {
            state.score = 0; state.xp = 0; state.lives = 3; state.gradeIdx = 0; state.stage = 1;
            document.querySelectorAll('[id$="-overlay"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('stage-val').innerText = `Étape 1`;
            generateLevel(state.stage);
            resetBall();
            updateRankUI(); updateLivesUI();
            countdown(() => state.status = 'PLAYING');
        }

        // --- EVENTS ---
        document.getElementById('btn-start').onclick = () => { 
            initAudio(); 
            gsap.to("#menu-overlay", { opacity: 0, scale: 1.1, duration: 0.5, onComplete: startGame });
        };
        document.getElementById('btn-restart').onclick = () => { initAudio(); startGame(); };
        document.getElementById('btn-pause').onclick = () => { if(state.status === 'PLAYING') { state.status = 'PAUSE'; document.getElementById('pause-overlay').classList.remove('hidden'); } };
        document.getElementById('btn-resume').onclick = () => { document.getElementById('pause-overlay').classList.add('hidden'); countdown(() => state.status = 'PLAYING'); };
        
        document.getElementById('grade-trigger').onclick = openRoadmap;
        document.getElementById('btn-close-roadmap').onclick = () => {
            gsap.to("#roadmap-card", { scale: 0.8, opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('roadmap-overlay').classList.add('hidden');
                gsap.set("#roadmap-card", { scale: 1, opacity: 1 });
            }});
        };

        const move = (x) => {
            const rect = canvas.getBoundingClientRect();
            state.paddle.x = Math.max(0, Math.min(canvas.width - state.paddle.w, (x - rect.left) - state.paddle.w/2));
        };
        canvas.addEventListener('mousemove', e => move(e.clientX));
        canvas.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0].clientX); }, { passive: false });

        window.onload = () => { 
            resize(); draw(); drawFire(); 
            gsap.to(["#hud", "#game-container"], { opacity: 1, duration: 1, stagger: 0.3, ease: "power3.out" }); 
            gsap.from("#logo-container", { y: -20, opacity: 0, duration: 1, ease: "bounce.out" });
            lucide.createIcons(); 
        };
        window.onresize = resize;
    </script>
</body>
</html>
